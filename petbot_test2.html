<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>PetBot B - Handheld Mini Toy</title>
<style>
:root{--pink:#f05fb2;--blue:#28b9e8;--red:#ef3f43;--cream:#fffaf3;--ink:#24152e;--yellow:#ffe66f;--green:#47d990;--roomA:#dff8ff;--roomB:#fff4fb;--roomC:#ffd5ef}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:radial-gradient(circle at 50% 0%,#e9fbff 0 22%,#ffd4ec 58%,#ef7bc0 120%)}button,select{font:inherit}button{cursor:pointer;border:0}.app{height:100dvh;width:100vw;display:grid;place-items:center;padding:12px;overflow:hidden}.toy{position:relative;width:min(760px,98vw);height:min(1040px,98dvh);border-radius:74px;background:linear-gradient(145deg,#fffdf8 0 38%,#ffcae8 39% 100%);border:8px solid white;box-shadow:0 0 0 12px #ef3f43,0 30px 65px rgba(36,21,46,.38),0 0 40px rgba(240,95,178,.86),0 0 80px rgba(40,185,232,.66),inset 0 12px 24px rgba(255,255,255,.9),inset 0 -28px 0 rgba(210,50,129,.18);display:grid;grid-template-rows:118px 1fr 210px 58px;overflow:hidden}.toy:before,.toy:after{content:"";position:absolute;top:138px;width:46px;height:380px;border-radius:999px;background:linear-gradient(#ff5e66,#c81424);box-shadow:inset 10px 0 rgba(255,255,255,.35),0 0 18px rgba(239,63,67,.65)}.toy:before{left:18px}.toy:after{right:18px}.top{position:relative;z-index:2;text-align:center;padding-top:13px;background:linear-gradient(#fff,#fff9fb);border-bottom:7px solid #ef3f43}.siren{width:260px;height:42px;margin:0 auto 4px;border:7px solid #1c2638;border-radius:14px;background:#111;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:5px;box-shadow:0 0 24px rgba(40,185,232,.9),inset 0 0 12px #000}.lamp{border-radius:8px;box-shadow:inset 0 7px 8px rgba(255,255,255,.45),inset 0 -6px 9px rgba(0,0,0,.22)}.blue{background:linear-gradient(#72ddff,#087fd5)}.red{background:linear-gradient(#ff7479,#e21f2a)}.white{background:linear-gradient(#fff,#dce5ee)}h1{font-size:clamp(36px,6vw,60px);line-height:.82;margin:0;color:#ef3f43;text-shadow:3px 3px 0 white,6px 6px 0 rgba(40,185,232,.58);letter-spacing:-2px}.links{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between}.miniLink{border-radius:999px;padding:8px 10px;font-size:12px;font-weight:1000;text-decoration:none;background:linear-gradient(#fff17e,#ffd746);box-shadow:0 5px 0 #b98e00;color:#24152e}.miniLink.dark{background:linear-gradient(#322042,#120d1c);color:#fff;box-shadow:0 5px 0 #050308}.screenShell{position:relative;z-index:2;margin:20px 68px 8px;border-radius:44px;background:#131b30;border:12px solid #151629;box-shadow:0 16px 0 #080913,0 0 32px rgba(240,95,178,.92),0 0 65px rgba(40,185,232,.75);overflow:hidden;display:grid;grid-template-rows:auto 1fr auto;min-height:0}.screenTop{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:10px;background:linear-gradient(#d9f7ff,#aceeff);border-bottom:5px solid #55c7e7}.selector{display:flex;gap:7px;align-items:center}select{min-width:180px;max-width:100%;height:38px;border:0;border-radius:999px;padding:0 14px;background:white;font-weight:1000;box-shadow:inset 0 -3px rgba(40,185,232,.2)}.round{width:38px;height:38px;border-radius:50%;background:linear-gradient(#fffca8,#ffd749);box-shadow:0 5px 0 #bc9300;font-weight:1000}.love{background:linear-gradient(#0e98e9,#005aa8);color:white;padding:8px 12px;border-radius:999px;font-weight:1000}.stage{position:relative;display:grid;place-items:center;min-height:0;background:linear-gradient(180deg,var(--roomA),var(--roomB) 58%,var(--roomC) 59%);box-shadow:inset 0 -28px rgba(210,130,194,.20),inset 0 0 55px rgba(255,255,255,.86);overflow:hidden}.stage:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.65),transparent 32%);pointer-events:none}.room{position:absolute;left:13px;top:13px;border-radius:999px;background:rgba(255,255,255,.82);padding:7px 11px;font-size:12px;font-weight:1000;border:3px solid rgba(40,185,232,.4)}.pet{position:relative;z-index:2;max-width:58%;max-height:80%;object-fit:contain;filter:drop-shadow(0 20px 18px rgba(0,0,0,.30))}.pet.bounce{animation:bounce .45s ease}@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(-18px) scale(1.04)}70%{transform:translateY(4px) scale(.98)}}.bubble{position:absolute;right:5%;top:15%;z-index:4;border-radius:999px;background:linear-gradient(#fff,#ffe9f8);border:4px solid var(--pink);padding:11px 15px;font-weight:1000;opacity:0;pointer-events:none;box-shadow:0 0 24px rgba(240,95,178,.7),0 10px 14px rgba(0,0,0,.18)}.bubble.show{animation:pop .95s ease}@keyframes pop{0%{opacity:0;transform:translateY(16px) scale(.8)}20%,75%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-14px) scale(.95)}}.statLine{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:7px;background:linear-gradient(#d8f8ff,#bdeeff);border-top:4px solid #43bfdf}.stat{display:grid;gap:3px;text-align:center;font-size:11px;font-weight:1000}.meter{height:10px;border-radius:999px;background:rgba(255,255,255,.52);overflow:hidden;border:2px solid rgba(255,255,255,.7)}.meter span{display:block;height:100%;background:linear-gradient(90deg,#ff62ba,#ffe16b);border-radius:999px}.controls{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:18px 52px 10px;align-items:center}.dpad{justify-self:center;width:170px;height:170px;position:relative;border-radius:34px;background:linear-gradient(145deg,#ff7d86,#e91f38);border:7px solid #c9152b;box-shadow:0 18px 0 #9d0d22,0 0 28px rgba(239,63,67,.65),inset 0 11px 16px rgba(255,255,255,.35)}.dpad button{position:absolute;background:rgba(255,255,255,.86);color:#e91f38;font-weight:1000;border-radius:16px;box-shadow:inset 0 -4px 0 rgba(0,0,0,.12)}.dpad .up{left:35%;top:8%;width:30%;height:28%}.dpad .down{left:35%;bottom:8%;width:30%;height:28%}.dpad .left{left:8%;top:35%;width:28%;height:30%}.dpad .right{right:8%;top:35%;width:28%;height:30%}.dpad .centre{left:36%;top:36%;width:28%;height:28%;border-radius:50%;background:#fff}.actionGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{min-height:58px;border-radius:20px;background:linear-gradient(#fff8ff,#ffeaf8);box-shadow:0 8px 0 #d43b93,0 10px 12px rgba(0,0,0,.14),inset 0 10px 16px rgba(255,255,255,.85);font-weight:1000;color:#24152e}.btn.yellow{background:linear-gradient(#fff5a7,#ffe16b);box-shadow:0 8px 0 #c79700}.btn.blueBtn{background:linear-gradient(#f2ffff,#d8faff);box-shadow:0 8px 0 #0893cf}.btn:active,.round:active,.miniLink:active,.dpad button:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.35)}.bottomActions{position:relative;z-index:2;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:0 30px 8px}.status{font-size:12px;text-align:center;font-weight:900;padding:5px 14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pacifier{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:300px;height:96px;border-radius:70px 70px 30px 30px;background:linear-gradient(#ff9bd4,#ef5fb2);border:7px solid white;box-shadow:0 0 28px rgba(240,95,178,.85),0 14px 0 #b12874}.pacifier:after{content:"";position:absolute;left:18%;right:18%;bottom:18px;height:20px;border:7px solid #4a203b;border-top:0;border-radius:0 0 50px 50px}@media(max-width:720px){.app{padding:0}.toy{width:100vw;height:100dvh;border-radius:0;border:0;box-shadow:none;grid-template-rows:76px 1fr 176px 36px}.toy:before,.toy:after,.pacifier{display:none}.top{padding-top:7px}h1{font-size:25px;letter-spacing:-1px}.siren{width:120px;height:25px;border-width:4px;padding:3px;gap:3px}.links{top:6px;left:6px;right:6px}.miniLink{font-size:10px;padding:6px}.screenShell{margin:8px;border-width:7px;border-radius:22px}.screenTop{padding:7px;grid-template-columns:1fr auto}select{width:46vw;min-width:110px}.round{width:33px;height:33px}.love{font-size:12px;padding:7px 9px}.room{font-size:10px}.pet{max-width:56%;max-height:80%}.controls{padding:7px 8px;gap:8px;grid-template-columns:104px 1fr}.dpad{width:96px;height:96px;border-radius:22px;border-width:5px}.actionGrid{gap:6px}.btn{min-height:43px;border-radius:12px;font-size:11px;box-shadow:0 5px 0 #d43b93}.bottomActions{padding:0 8px 4px;gap:5px}.status{font-size:10px;padding:3px 8px}}
</style></head><body><div class="app"><main class="toy"><header class="top"><div class="links"><a class="miniLink" href="petbot_test.html">← Pick</a><a class="miniLink dark" href="index.html">Game</a></div><div class="siren"><span class="lamp blue"></span><span class="lamp white"></span><span class="lamp red"></span><span class="lamp white"></span><span class="lamp blue"></span></div><h1>Mini PetBot</h1></header><section class="screenShell"><div class="screenTop"><div class="selector"><button class="round" data-action="prev">←</button><select data-pet-select></select><button class="round" data-action="next">→</button></div><div class="love">💗 <span data-love>0</span></div></div><div class="stage" data-stage><span class="room">🏡 <span data-habitat-name></span></span><img class="pet" data-pet-img alt="pet"><div class="bubble" data-bubble>Ready!</div></div><div class="statLine"><div class="stat">🍔<div class="meter"><span data-bar="hunger"></span></div></div><div class="stat">😊<div class="meter"><span data-bar="happy"></span></div></div><div class="stat">⚡<div class="meter"><span data-bar="energy"></span></div></div><div class="stat">💊<div class="meter"><span data-bar="health"></span></div></div></div></section><section class="controls"><div class="dpad"><button class="up" data-action="feed">▲</button><button class="down" data-action="rest">▼</button><button class="left" data-action="prev">◀</button><button class="right" data-action="next">▶</button><button class="centre" data-action="play">♥</button></div><div class="actionGrid"><button class="btn yellow" data-action="feed">🍔 Feed</button><button class="btn" data-action="play">🧸 Play</button><button class="btn blueBtn" data-action="rest">🌙 Rest</button><button class="btn" data-action="heal">💊 Heal</button><button class="btn blueBtn" data-action="habitat">🏡 Habitat</button><button class="btn yellow" data-action="shop">🛒 Shop</button></div></section><section class="bottomActions"><button class="btn blueBtn" data-action="room">🎨 Room</button><button class="btn" data-action="explore">🧭 Explore</button><button class="btn yellow" data-action="useMain">⭐ Main</button><button class="btn blueBtn" data-action="useSide">🐾 Side</button></section><footer class="status" data-status>Ready.</footer><div class="pacifier" aria-hidden="true"></div></main></div><script>
const pets=[
  {name:'Bubbles',type:'Axolotl',level:5,love:128,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781797059/ax_idle_001.png',hunger:68,happy:80,energy:48,health:90,habitat:'Pink Bubble Room'},
  {name:'Pura',type:'Mascot',level:7,love:211,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798378/pura_idle_001.png',hunger:78,happy:72,energy:65,health:86,habitat:'Dice Den'},
  {name:'Moonbeam',type:'Unicorn',level:4,love:95,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798484/unicorn_idle_001.png',hunger:52,happy:60,energy:82,health:75,habitat:'Moon Meadow'},
  {name:'Hoots',type:'Owl',level:3,love:84,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1782133620/owl_idle_001.png',hunger:58,happy:63,energy:74,health:80,habitat:'Tree Loft'}
];
let idx=0, room=0;
const rooms=[
  ['#dff8ff','#fff4fb','#ffd5ef','Pink Bubble Room'],
  ['#eaf7ff','#d6fff2','#c6f7ff','Blue Cloud Room'],
  ['#251743','#4f256d','#ffb3e6','Night Glow Room'],
  ['#fff4ce','#ffe09a','#f7c84b','Prize Room']
];
const $=id=>document.getElementById(id);
function clamp(v){return Math.max(0,Math.min(100,Number(v)||0));}
function render(){
  const p=pets[idx];
  document.querySelectorAll('[data-pet-select]').forEach(sel=>{sel.value=String(idx)});
  document.querySelectorAll('[data-pet-name]').forEach(el=>el.textContent=p.name);
  document.querySelectorAll('[data-pet-type]').forEach(el=>el.textContent=p.type);
  document.querySelectorAll('[data-love]').forEach(el=>el.textContent=p.love);
  document.querySelectorAll('[data-level]').forEach(el=>el.textContent=`LV. ${String(p.level).padStart(2,'0')}`);
  document.querySelectorAll('[data-habitat-name]').forEach(el=>el.textContent=rooms[room][3]);
  document.querySelectorAll('[data-pet-img]').forEach(img=>{img.src=p.img; img.alt=`${p.name} the ${p.type}`;});
  const bars={hunger:p.hunger,happy:p.happy,energy:p.energy,health:p.health};
  Object.entries(bars).forEach(([k,v])=>document.querySelectorAll(`[data-bar="${k}"]`).forEach(el=>el.style.width=clamp(v)+'%'));
  document.querySelectorAll('[data-stage]').forEach(stage=>{
    stage.style.setProperty('--roomA',rooms[room][0]);
    stage.style.setProperty('--roomB',rooms[room][1]);
    stage.style.setProperty('--roomC',rooms[room][2]);
  });
  setStatus(`<b>${p.name}</b> is ready in ${rooms[room][3]}. All visible buttons are real test controls.`);
}
function setStatus(html){document.querySelectorAll('[data-status]').forEach(el=>el.innerHTML=html)}
function bubble(text){
  document.querySelectorAll('[data-bubble]').forEach(b=>{b.textContent=text;b.classList.remove('show');void b.offsetWidth;b.classList.add('show')});
  document.querySelectorAll('[data-pet-img]').forEach(img=>{img.classList.remove('bounce');void img.offsetWidth;img.classList.add('bounce')});
}
function changePet(delta){idx=(idx+delta+pets.length)%pets.length;render();bubble('Pet changed 🐾')}
function act(action){
  const p=pets[idx];
  if(action==='prev')return changePet(-1);
  if(action==='next')return changePet(1);
  if(action==='room'){room=(room+1)%rooms.length; render(); return bubble('Habitat changed 🏡');}
  const msg={feed:'Fed! 🍔',play:'Play time! 🧸',rest:'Resting... 🌙',heal:'Healed! 💊',train:'Training! 🏋️',explore:'Exploring! 🧭',shop:'Shop opened 🛒',habitat:'Habitat view 🏡',useMain:'Set as main ⭐',useSide:'Set as sidekick 🐾'};
  if(action==='feed'){p.hunger=clamp(p.hunger+12);p.energy=clamp(p.energy-3)}
  if(action==='play'){p.happy=clamp(p.happy+12);p.energy=clamp(p.energy-6);p.love+=3}
  if(action==='rest'){p.energy=clamp(p.energy+16);p.hunger=clamp(p.hunger-4)}
  if(action==='heal'){p.health=clamp(p.health+12);p.love+=2}
  if(action==='train'){p.energy=clamp(p.energy-8);p.happy=clamp(p.happy+4);p.love+=1}
  if(action==='explore'){p.happy=clamp(p.happy+6);p.energy=clamp(p.energy-6);p.love+=2}
  if(action==='shop'){setStatus('<b>Shop test:</b> this will later connect to PetBot shop stock and inventory.');}
  if(action==='habitat'){setStatus('<b>Habitat test:</b> this will later read user_habitat_layout and Sheet 51.');}
  render(); bubble(msg[action]||'Done!');
}
function initPetbot(){
  document.querySelectorAll('[data-pet-select]').forEach(sel=>{
    pets.forEach((p,i)=>{const opt=document.createElement('option');opt.value=String(i);opt.textContent=`${p.name} · ${p.type}`;sel.appendChild(opt)});
    sel.addEventListener('change',e=>{idx=Number(e.target.value)||0;render();bubble('Pet selected 🐾')});
  });
  document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',()=>act(btn.dataset.action)));
  render();
}
initPetbot();
</script></body></html>
