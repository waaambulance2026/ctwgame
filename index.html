<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CTW Clean Tamagotchi Quest</title>
<style>
/* ============================================================
CTW CLEAN TAMAGOTCHI QUEST - ONE ROUTER VERSION

PART 1 = LOOKS
PART 2 = PAGE PIECES
PART 3 = GAME BRAIN

This file intentionally does NOT use an iframe.
There is one screen router and one set of button rules.
============================================================ */

/* ============================================================
PART 1A - BASIC THEME
============================================================ */
:root{
  --pink:#f7b5dc;
  --hotPink:#f05aa9;
  --blue:#9feaff;
  --yellow:#f5c542;
  --ink:#16223f;
  --lcd:#dff7fb;
  --lcd2:#bfe9ee;
  --night:#101022;
  --white:#fff;
  --cloudinary:https://res.cloudinary.com/dpwlfmhia/image/upload;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Verdana,Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 50% 35%,#fff 0,#fff2fb 36%,#dff7ff 100%);touch-action:none;user-select:none}
button,input{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}

/* ============================================================
PART 1B - APP MODES
============================================================ */
#app{position:fixed;inset:0;overflow:hidden;background:radial-gradient(circle at 50% 35%,#fff 0,#fff2fb 36%,#dff7ff 100%)}
body.mode-pc-quest #tamaLayer{display:none}
body.mode-pc-quest #pcQuestLayer{display:grid}
body:not(.mode-pc-quest) #pcQuestLayer{display:none}

/* ============================================================
PART 1C - TAMAGOTCHI DEVICE
============================================================ */
#tamaLayer{position:fixed;inset:0;display:grid;place-items:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);z-index:20}
.device{position:relative;width:min(94vw,calc(98vh * .6667));aspect-ratio:2/3;filter:drop-shadow(0 18px 30px rgba(18,20,45,.25))}
.deviceShell{position:absolute;inset:0;background:url('petbot_device.png') center/contain no-repeat;z-index:10;pointer-events:none}
.deviceFallback{position:absolute;inset:1.5%;border-radius:48% 48% 44% 44%/38% 38% 50% 50%;background:linear-gradient(180deg,#fff,#fff5fb 55%,#ffe0f3);border:8px solid rgba(255,100,168,.35);box-shadow:inset 0 0 0 8px rgba(255,255,255,.7);z-index:0}
.lcd{position:absolute;z-index:2;left:21.2%;top:39.4%;width:57.6%;height:27.1%;border-radius:7%/11%;overflow:hidden;background:linear-gradient(180deg,var(--lcd),var(--lcd2));box-shadow:inset 0 0 0 2px rgba(21,34,63,.35),inset 0 0 22px rgba(255,255,255,.9)}
.lcd::before{content:"";position:absolute;inset:0;z-index:20;pointer-events:none;background:linear-gradient(90deg,rgba(255,255,255,.25),transparent 18%,transparent 82%,rgba(255,255,255,.20)),repeating-linear-gradient(0deg,rgba(0,0,0,.055) 0 1px,transparent 1px 4px);opacity:.42}
.lcdContent{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;min-height:0}
.top{height:14%;min-height:14px;padding:1px 12px;background:rgba(255,255,255,.22);display:grid;place-items:center;text-align:center;font-weight:1000;font-size:clamp(8px,1.05vw,13px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.body{position:relative;flex:1;min-height:0;padding:5px 8px 7px;display:grid;place-items:center;overflow:hidden}
.hit{position:absolute;z-index:40;border:0;background:transparent;color:transparent;outline:none;-webkit-tap-highlight-color:transparent}
.hit:focus-visible{outline:3px solid rgba(245,197,66,.85);outline-offset:2px;border-radius:999px}
.hit.siren{left:31%;top:6.5%;width:38%;height:12%;border-radius:18px}
.hit.exit{left:43%;top:15%;width:14%;height:10.5%;border-radius:50%}
.hit.prev{left:13.6%;top:67.8%;width:16.2%;height:13.8%;border-radius:42%}
.hit.select{left:38%;top:70.8%;width:24%;height:16.2%;border-radius:50%}
.hit.next{left:70.2%;top:67.8%;width:16.2%;height:13.8%;border-radius:42%}

/* ============================================================
PART 1D - PETBOT MENU SCREENS
============================================================ */
.choiceList,.menuGrid,.panelGrid{width:100%;height:100%;display:grid;gap:4px}
.choiceList{align-content:center}
.choice,.menuItem,.panelCard,.careCard{border:1.5px solid rgba(22,34,63,.28);background:rgba(255,255,255,.38);border-radius:9px;font-weight:1000;color:var(--ink)}
.choice{display:grid;grid-template-columns:auto 1fr;gap:5px;align-items:center;padding:5px 7px;font-size:clamp(8px,.9vw,12px);line-height:1.05}
.choice small,.panelCard small{display:block;opacity:.72;font-size:.78em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.active{background:rgba(255,255,255,.82)!important;outline:2px solid rgba(22,34,63,.35)}
.passwordCard,.messageCard{width:94%;max-width:280px;text-align:center;font-weight:1000;background:rgba(255,255,255,.38);border:1.5px solid rgba(22,34,63,.28);border-radius:12px;padding:8px}
.passwordCard input{width:95%;margin:6px auto 4px;display:block;border:1.5px solid rgba(22,34,63,.45);border-radius:9px;padding:6px;text-align:center;font-weight:1000;background:rgba(255,255,255,.9);color:#111;user-select:text}
.error{min-height:1.1em;color:#9b1a56;font-size:clamp(7px,.82vw,11px);font-weight:1000}
.loader{width:34px;height:34px;border-radius:50%;border:4px solid rgba(22,34,63,.16);border-top-color:rgba(22,34,63,.8);animation:spin .8s linear infinite;margin:auto}@keyframes spin{to{transform:rotate(360deg)}}
.petHome{width:100%;height:100%;display:grid;grid-template-columns:43% 57%;gap:5px;align-items:center;padding:4px 8px 6px}
.petArt{position:relative;width:100%;height:100%;display:grid;place-items:center;overflow:visible}
.petImg{position:absolute;left:50%;top:52%;width:92%;height:92%;transform:translate(-50%,-50%);background:center/contain no-repeat;filter:drop-shadow(0 6px 6px rgba(25,35,55,.22))}
.petEmoji{font-size:clamp(42px,6vw,78px);filter:drop-shadow(0 5px 5px rgba(25,35,55,.2))}
.petStats{height:100%;display:grid;grid-template-rows:auto repeat(4,1fr);gap:3px;min-width:0}
.petSub{text-align:center;font-weight:1000;opacity:.78;font-size:clamp(6px,.72vw,9px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat{display:grid;grid-template-rows:auto 7px;gap:2px;border:1px solid rgba(22,34,63,.18);border-radius:8px;background:rgba(255,255,255,.46);padding:3px 5px;min-width:0}
.statTop{display:flex;justify-content:space-between;gap:4px;font-weight:1000;font-size:clamp(6px,.76vw,10px);line-height:1;white-space:nowrap}
.statBar{height:7px;border-radius:999px;background:rgba(255,255,255,.82);box-shadow:inset 0 0 0 1px rgba(22,34,63,.2);overflow:hidden}.statBar i{display:block;height:100%;border-radius:999px;background:rgba(22,34,63,.55)}
.actionGrid{width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);gap:4px}
.menuItem,.careCard{display:grid;grid-template-columns:auto 1fr;align-items:center;gap:5px;padding:4px 6px;font-size:clamp(7px,.8vw,11px);line-height:1.05;text-align:left;overflow:hidden}.menuItem b,.careCard b{font-size:1.35em}.menuItem span,.careCard span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.panelGrid{grid-template-columns:1fr 1fr;grid-auto-rows:1fr;overflow:hidden}.panelCard{padding:5px 6px;font-size:clamp(7px,.82vw,11px);line-height:1.08;display:flex;flex-direction:column;justify-content:center;overflow:hidden}.panelTitle{font-size:clamp(9px,1vw,13px);font-weight:1000;text-align:center;margin-bottom:4px}.panelText{font-size:clamp(7px,.8vw,10px);font-weight:900;text-align:center;line-height:1.18}.helpText{opacity:.78;font-size:clamp(6px,.72vw,9px);text-align:center;margin-top:3px;font-weight:900}.welcomeText{font-size:clamp(8px,.94vw,12px);line-height:1.18;font-weight:900;text-align:center}

/* ============================================================
PART 1E - QUEST SCREEN
============================================================ */
.questWrap{position:relative;width:100%;height:100%;overflow:hidden;background:#79d9ff;color:white;border-radius:8px;isolation:isolate}
.questWrap.pc{width:min(100vw,calc(100vh * 16 / 9));height:min(100vh,calc(100vw * 9 / 16));border-radius:0;box-shadow:0 0 0 9999px #050816}
.questSky,.questHills,.questGround{position:absolute;left:0;width:100%;background-repeat:repeat-x;pointer-events:none}.questSky{inset:0;background-image:url('https://res.cloudinary.com/dpwlfmhia/image/upload/v1781638231/day_sky.png');background-size:cover;background-position:center;z-index:0}.questHills{height:48%;bottom:7%;background-image:url('https://res.cloudinary.com/dpwlfmhia/image/upload/day_hills.png');background-size:auto 100%;z-index:1}.questGround{height:28%;bottom:-9%;background-image:url('https://res.cloudinary.com/dpwlfmhia/image/upload/day_ground.png');background-size:auto 100%;z-index:2}
body.night .questSky{background-image:url('https://res.cloudinary.com/dpwlfmhia/image/upload/v1781638223/night_sky.png')}body.night .questHills,body.night .questGround{filter:brightness(.58) saturate(.95) hue-rotate(155deg)}
.questHud{position:absolute;z-index:30;left:6px;right:6px;top:5px;display:flex;justify-content:space-between;gap:5px;font-size:clamp(7px,.85vw,13px);font-weight:1000;text-shadow:0 2px 4px rgba(0,0,0,.55)}.questWrap.pc .questHud{font-size:18px;left:18px;right:18px;top:16px}
.questPlayer{position:absolute;z-index:20;width:16%;height:34%;left:18%;bottom:15%;background:center bottom/contain no-repeat;filter:drop-shadow(0 12px 10px rgba(0,0,0,.32));transition:bottom .08s linear}.questPlayer.fallback{display:grid;place-items:center;font-size:clamp(28px,6vw,90px)}.questWrap.pc .questPlayer{width:9%;height:24%;left:18%;bottom:12%}
.questObject{position:absolute;z-index:12;bottom:18%;transform:translateX(-50%);display:grid;place-items:end center;text-align:center;font-weight:1000;color:#24152e}.questObject .emoji{font-size:clamp(18px,3.2vw,56px);filter:drop-shadow(0 8px 6px rgba(0,0,0,.3))}.questObject .label{background:rgba(255,255,255,.88);border:2px solid rgba(22,34,63,.24);border-radius:999px;padding:2px 6px;font-size:clamp(6px,.72vw,10px);white-space:nowrap;box-shadow:0 4px 10px rgba(0,0,0,.2)}.questObject.near .label{background:var(--yellow)}.questWrap.pc .questObject .emoji{font-size:58px}.questWrap.pc .questObject .label{font-size:15px;padding:5px 10px}
.questCaption{position:absolute;z-index:50;left:6px;right:6px;bottom:6px;min-height:18px;border-radius:999px;background:rgba(255,247,189,.94);color:#24152e;display:grid;place-items:center;text-align:center;padding:4px 8px;font-weight:1000;font-size:clamp(7px,.84vw,12px);box-shadow:0 6px 16px rgba(0,0,0,.25);pointer-events:none}.questWrap.pc .questCaption{left:50%;right:auto;bottom:24px;transform:translateX(-50%);min-width:min(760px,80vw);font-size:20px;padding:11px 20px}
#pcQuestLayer{position:fixed;inset:0;z-index:100;place-items:center;background:#050816}.pcTopButtons{position:fixed;right:14px;top:14px;z-index:200;display:flex;gap:8px}.pcTopButtons button{border:0;border-radius:999px;padding:10px 14px;font-weight:1000;color:#24152e;background:var(--yellow);box-shadow:0 6px 14px rgba(0,0,0,.24)}
.toast{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 14px);z-index:500;transform:translateX(-50%) translateY(-16px);opacity:0;max-width:min(90vw,720px);padding:10px 16px;border-radius:999px;background:linear-gradient(180deg,#fff7bd,var(--yellow));color:#24152e;font-weight:1000;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.24);transition:.18s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:620px){.device{width:min(99vw,calc(99vh * .6667))}.body{padding:4px 6px 6px}.petHome{grid-template-columns:41% 59%;gap:4px;padding:3px 7px 5px}.stat{padding:2px 4px}.statBar{height:6px}.menuItem,.careCard{padding:4px}.questWrap.pc{width:100vw;height:100dvh}}
</style>
</head>
<body class="mode-tama">
<div id="app">
  <!-- ========================================================
  PART 2 - PAGE PIECES
  ======================================================== -->
  <section id="tamaLayer" aria-label="CTW Tamagotchi">
    <div class="device" id="device">
      <div class="deviceFallback"></div>
      <div class="lcd"><div id="lcdContent" class="lcdContent"></div></div>
      <div class="deviceShell"></div>
      <button class="hit siren" id="btnSiren" aria-label="Siren / fullscreen"></button>
      <button class="hit exit" id="btnBack" aria-label="Back"></button>
      <button class="hit prev" id="btnPrev" aria-label="Previous / left"></button>
      <button class="hit select" id="btnSelect" aria-label="Select / jump"></button>
      <button class="hit next" id="btnNext" aria-label="Next / right"></button>
    </div>
  </section>
  <section id="pcQuestLayer" aria-label="PC fullscreen quest">
    <div class="pcTopButtons"><button id="btnPcReturn">Return to Tamagotchi</button></div>
    <div id="pcQuestMount"></div>
  </section>
  <div id="toast" class="toast"></div>
</div>

<script>
/* ============================================================
PART 3 - GAME BRAIN

Only one router controls screens:
- player picker
- pet home/menu/panels
- embedded quest inside the LCD
- PC fullscreen quest
============================================================ */
(function(){
'use strict';

/* ============================================================
PART 3A - EDIT THESE GAME SETTINGS
============================================================ */
const CLOUD='https://res.cloudinary.com/dpwlfmhia/image/upload';
const SPREADSHEET_ID='1A-Uzz8q32PdNOcTXLwpPLT-9RAmCc3ZtYL-LdRU8avA';
const PLAYER_LIST=[
  {key:'ax',label:'Ax',display:"Ryan's Axolotl",userId:'1214671839205396481',password:'Axtok'},
  {key:'aly',label:'Aly',display:'Ashely with one L',userId:'1407957358683885670',password:'Alytok'},
  {key:'test',label:'Test',display:'Safe test mode',userId:'test',password:'',test:true}
];
const TEST_PETS=[
  {name:'Test Raven',pet:'raven',category:'birds',code:'test_raven_1',level:3,xp:240,hunger:80,happiness:70,energy:75,health:90,emoji:'🐦‍⬛'},
  {name:'Test Owl',pet:'owl',category:'birds',code:'test_owl_1',level:2,xp:120,hunger:90,happiness:75,energy:68,health:100,emoji:'🦉'},
  {name:'Test Dragon',pet:'dragon',category:'mythical',code:'test_dragon_1',level:5,xp:600,hunger:65,happiness:90,energy:60,health:88,emoji:'🐉'}
];
const ACTIONS=[
  {key:'care',label:'Care',icon:'💗'},
  {key:'shop',label:'Shop',icon:'🛍️'},
  {key:'inventory',label:'Inventory',icon:'🎒'},
  {key:'habitat',label:'Habitat',icon:'🏡'},
  {key:'games',label:'Quest',icon:'🎮'},
  {key:'hook',label:'Hook-a-Waa',icon:'🎣'}
];
const GAME_MENU=[
  {key:'solo',label:'Solo Quest',icon:'🚑'},
  {key:'team',label:'Team Quest',icon:'👥'},
  {key:'back',label:'Back',icon:'↩️'}
];
const CARE_MENU=[
  {key:'feed',label:'Feed',icon:'🍔'},
  {key:'play',label:'Play',icon:'🧸'},
  {key:'rest',label:'Rest',icon:'💤'},
  {key:'heal',label:'Heal',icon:'💊'},
  {key:'train',label:'Train',icon:'⭐'}
];
const QUEST_OBJECTS=[
  {key:'welcome',label:'Welcome Board',emoji:'📋',at:450,type:'welcome'},
  {key:'shop',label:'Pet Shop',emoji:'🏪',at:950,type:'shop'},
  {key:'habitat',label:'Habitat',emoji:'🏡',at:1450,type:'habitat'},
  {key:'hook',label:'Hook-a-Waa',emoji:'🎣',at:1950,type:'hook'},
  {key:'quest',label:'Quest Sign',emoji:'🚩',at:2450,type:'games'}
];
const SPRITES={
  ax:{idle:`${CLOUD}/ax_idle_001.png`,walk:`${CLOUD}/ax_walk_001.png`,jump:`${CLOUD}/ax_jump_001.png`},
  pura:{idle:`${CLOUD}/pura_idle_001.png`,walk:`${CLOUD}/pura_walk_001.png`,jump:`${CLOUD}/pura_jump_001.png`}
};

/* ============================================================
PART 3B - STATE AND HELPERS
============================================================ */
const $=id=>document.getElementById(id);
const clean=v=>String(v??'').trim();
const norm=s=>String(s??'').toLowerCase().replace(/[^a-z0-9]+/g,'');
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const clamp=(n,min,max)=>Math.max(min,Math.min(max,n));
function num(v,f=0){const x=Number(String(v??'').replace(/,/g,''));return Number.isFinite(x)?x:f;}
let state={
  screen:'playerPicker',
  pickerIndex:0,
  password:'',
  error:'',
  player:null,
  pets:[],
  petIndex:0,
  actionIndex:0,
  gameIndex:0,
  careIndex:0,
  panelIndex:0,
  loadingText:'',
  questMode:'Solo Quest',
  quest:{distance:0,playerY:0,velY:0,movingLeft:false,movingRight:false,jumping:false,score:0,caption:'Choose a quest.',near:null,frame:0,last:0}
};
let toastTimer=null;
function toast(msg){const el=$('toast');if(!el)return;el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1600)}
function currentPet(){return state.pets[state.petIndex]||null;}
function petTitle(p=currentPet()){return p?(p.name||p.nickname||p.pet||'Pet'):'Pet';}
function top(title){return `<div class="top">${esc(title)}</div>`;}
function setScreen(screen){state.screen=screen;render();}
function modeClass(){document.body.classList.toggle('mode-pc-quest',state.screen==='pcQuest');document.body.classList.toggle('mode-tama',state.screen!=='pcQuest');}

/* ============================================================
PART 3C - PET IMAGE + DATA LOADING
============================================================ */
function emojiFor(text){const s=norm(text);if(s.includes('owl'))return'🦉';if(s.includes('dragon'))return'🐉';if(s.includes('raven')||s.includes('crow'))return'🐦‍⬛';if(s.includes('dog')||s.includes('pura'))return'🐶';if(s.includes('cat'))return'🐱';if(s.includes('unicorn'))return'🦄';return'🐾';}
function imageUrl(value){let v=clean(value).replace(/^['"]|['"]$/g,'');if(!v)return'';if(/^https?:\/\//i.test(v))return v;if(v.includes('res.cloudinary.com'))return 'https://'+v.replace(/^\/+/,'');return CLOUD+'/'+v.replace(/^\/+/,'');}
function pick(row,names,fallback=''){if(!row||typeof row!=='object')return fallback;const keys=Object.keys(row);const map=new Map(keys.map(k=>[norm(k),k]));for(const name of names){const k=map.get(norm(name));if(k!=null&&clean(row[k])!=='')return row[k];}for(const name of names){const want=norm(name);const k=keys.find(key=>norm(key).includes(want)||want.includes(norm(key)));if(k&&clean(row[k])!=='')return row[k];}return fallback;}
function strictUserMatch(row,userId){userId=String(userId||'');if(!userId)return false;const direct=clean(pick(row,['user_id','discord_user_id','discord_id','owner_id','member_id','player_id','User ID','Discord User ID'],''));if(direct)return direct===userId;return Object.values(row||{}).some(v=>clean(v)===userId);}
function hasOtherUser(row,userId){const other=clean(pick(row,['user_id','discord_user_id','discord_id','owner_id','member_id','player_id'],''));return !!other&&other!==String(userId||'');}
function matchPet(row,p){const hay=Object.values(row||{}).map(v=>clean(v).toLowerCase()).join(' | ');const bits=[p.userPetId,p.code,p.pet,p.name].map(v=>clean(v).toLowerCase()).filter(Boolean);return bits.some(b=>hay.includes(b));}
function normalisePet(row,userId){
  if(Array.isArray(row)){row={user_id:row[0],owner_display:row[1],user_pet_id:row[2],pet_code:row[3],pet:row[4],category:row[5],pet_name:row[6],level:row[7],xp:row[8],hunger:row[9],happiness:row[10],energy:row[11],health:row[12]};}
  const userPetId=pick(row,['user_pet_id','owned_pet_id','pet_instance_id','instance_id','id'],'');
  const code=pick(row,['pet_code','code','pet_key','pet_id'],userPetId||'');
  const pet=pick(row,['pet','species','animal','pet_type','type','base_pet','pet_key'],code||'');
  let name=pick(row,['nickname','pet_nickname','custom_name','given_name','pet_display_name','display_pet_name','display_name','pet_given_name','petName','name_given'],'');
  if(!name)name=pick(row,['pet_name','name','Name'],pet||code||'Pet');
  const url=imageUrl(pick(row,['image_url','url','cloudinary_image_url','image','pet_image','sprite_url','public_url','cloudinary_public_id'],''));
  return {raw:row,userId:pick(row,['user_id','discord_user_id','discord_id','owner_id','member_id','player_id'],userId||''),userPetId,code,pet,category:pick(row,['category','pet_category','class'],''),name,level:num(pick(row,['level','lvl'],1),1),xp:num(pick(row,['xp','experience','exp'],0),0),hunger:num(pick(row,['hunger','food','feed'],100),100),happiness:num(pick(row,['happiness','happy','mood'],100),100),energy:num(pick(row,['energy','stamina'],100),100),health:num(pick(row,['health','hp'],100),100),url,emoji:emojiFor(pet||name)};
}
function dedupePets(pets){const seen=new Set(),out=[];for(const p of pets){const key=clean(p.userPetId||p.code||p.name||JSON.stringify(p.raw||p));if(!key||seen.has(key))continue;seen.add(key);out.push(p);}return out;}
async function fetchJson(url,timeoutMs=12000){const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),timeoutMs);try{const res=await fetch(url,{headers:{accept:'application/json,text/plain,*/*'},cache:'no-store',signal:ctrl.signal});const text=await res.text();if(!res.ok)throw new Error('HTTP '+res.status+' '+text.slice(0,100));try{return JSON.parse(text)}catch(e){return {response:text}}}finally{clearTimeout(t)}}
function findArray(data,names){if(Array.isArray(data))return data;if(!data||typeof data!=='object')return[];for(const name of names){if(Array.isArray(data[name]))return data[name];}for(const val of Object.values(data)){if(Array.isArray(val)&&val.some(x=>x&&typeof x==='object'))return val;}return[];}
const SHEET_CACHE=new Map();
async function fetchSheetRows(tab){const cached=SHEET_CACHE.get(tab);if(cached&&Date.now()-cached.t<45000)return cached.rows;const url=`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?`+new URLSearchParams({tqx:'out:json',sheet:tab,tq:'select *'}).toString();const text=await (await fetch(url,{cache:'no-store'})).text();const start=text.indexOf('{'),end=text.lastIndexOf('}');if(start<0||end<start)throw new Error('Sheet not readable: '+tab);const data=JSON.parse(text.slice(start,end+1));const cols=(data.table.cols||[]).map((c,i)=>clean(c.label||c.id||('col'+i)));const rows=(data.table.rows||[]).map(r=>{const o={};(r.c||[]).forEach((cell,i)=>{o[cols[i]||('col'+i)]=cell?cell.v:''});return o});SHEET_CACHE.set(tab,{t:Date.now(),rows});return rows;}
async function fetchPetsViaProxy(userId){const url='/api/petbot?'+new URLSearchParams({mode:'view_pets',user_id:String(userId),per_page:'100',v:'clean-v1'});const data=await fetchJson(url,14000);const arr=findArray(data,['pets','owned_pets','user_pets','rows','data','items','results']);return arr.map(r=>normalisePet(r,userId));}
async function loadPetsForPlayer(player){
  if(player.test)return TEST_PETS.map(p=>({...p}));
  let pets=[];
  try{const rows=await fetchSheetRows('user_pets');pets=dedupePets(rows.filter(r=>strictUserMatch(r,player.userId)).map(r=>normalisePet(r,player.userId)));}catch(e){console.warn('user_pets direct failed',e)}
  if(!pets.length){try{pets=dedupePets((await fetchPetsViaProxy(player.userId)).filter(p=>strictUserMatch(p.raw||p,player.userId)));}catch(e){console.warn('proxy pets failed',e)}}
  try{const visualRows=[];for(const tab of ['Sheet51','user_pet_images','pet_action_images']){try{visualRows.push(...await fetchSheetRows(tab));}catch(e){}}
    pets=pets.map(p=>{const owned=visualRows.find(r=>strictUserMatch(r,player.userId)&&matchPet(r,p));const generic=owned||visualRows.find(r=>!hasOtherUser(r,player.userId)&&matchPet(r,p));const url=generic?imageUrl(pick(generic,['image_url','url','cloudinary_image_url','image','pet_image','sprite_url','public_url','cloudinary_public_id'],'')):'';return url?{...p,url,image_url:url}:p;});
  }catch(e){console.warn('visual enrich failed',e)}
  return pets;
}
function petArtHtml(p=currentPet()){const url=imageUrl(p?.url||p?.image_url||p?.cloudinary_image_url||'');if(url)return `<div class="petImg" style="background-image:url('${esc(url)}')"></div>`;return `<div class="petEmoji">${esc(p?.emoji||emojiFor(p?.pet||p?.name))}</div>`;}
function statHtml(icon,label,value){const v=clamp(Math.round(num(value,0)),0,100);return `<div class="stat"><div class="statTop"><span>${icon} ${esc(label)}</span><b>${v}</b></div><div class="statBar"><i style="width:${v}%"></i></div></div>`;}
async function choosePlayer(player){state.player={...player,password:undefined};state.screen='loading';state.loadingText='Loading '+player.label+' pets';render();try{const pets=await loadPetsForPlayer(player);if(!pets.length)throw new Error('No owned pets were found for '+player.label+'. Try Test mode or check user_pets.');state.pets=pets.map(p=>({...p,hunger:num(p.hunger,100),happiness:num(p.happiness,100),energy:num(p.energy,100),health:num(p.health,100),level:num(p.level,1),xp:num(p.xp,0),emoji:p.emoji||emojiFor(p.pet||p.name)}));state.petIndex=0;state.screen='petHome';toast('Loaded '+state.pets.length+' pets');render();}catch(e){state.error=e.message||String(e);state.screen='error';render();}}

/* ============================================================
PART 3D - RENDERER
============================================================ */
function render(){modeClass();const lcd=$('lcdContent');if(!lcd)return;let html='';
  if(state.screen==='playerPicker')html=renderPlayerPicker();
  else if(state.screen==='password')html=renderPassword();
  else if(state.screen==='loading')html=top('LOADING')+`<div class="body"><div class="messageCard"><div class="loader"></div><div>${esc(state.loadingText||'Loading')}</div></div></div>`;
  else if(state.screen==='petHome')html=renderPetHome();
  else if(state.screen==='actions')html=renderActions();
  else if(state.screen==='care')html=renderCare();
  else if(state.screen==='games')html=renderGames();
  else if(state.screen==='shop')html=renderPanel('SHOP','Shop items will load from your sheets next. This clean version keeps the screen stable first.');
  else if(state.screen==='inventory')html=renderPanel('INVENTORY','Inventory quick-use comes next.');
  else if(state.screen==='habitat')html=renderHabitat();
  else if(state.screen==='hook')html=renderPanel('HOOK-A-WAA','Pacifier casts the hook. Prize pool can be connected after the screens are stable.');
  else if(state.screen==='welcome')html=renderWelcome();
  else if(state.screen==='embeddedQuest')html=renderQuest('mini');
  else if(state.screen==='error')html=renderError();
  else html=renderError('Unknown screen '+state.screen);
  lcd.innerHTML=html;
  if(state.screen==='pcQuest')$('pcQuestMount').innerHTML=renderQuest('pc'); else $('pcQuestMount').innerHTML='';
  wireClickableCards();
  drawQuest();
}
function renderPlayerPicker(){return top('WHO IS PLAYING?')+`<div class="body"><div class="choiceList">${PLAYER_LIST.map((p,i)=>`<div class="choice ${i===state.pickerIndex?'active':''}" data-player="${i}"><span>${p.test?'🧪':'👤'}</span><div>${esc(p.label)}<small>${esc(p.display)}</small></div></div>`).join('')}</div></div>`;}
function renderPassword(){const p=PLAYER_LIST[state.pickerIndex]||PLAYER_LIST[0];return top('PASSWORD')+`<div class="body"><div class="passwordCard"><div>${esc(p.label)} password</div><input id="passInput" type="password" value="${esc(state.password)}" placeholder="type password"><div class="error">${esc(state.error)}</div></div></div>`;}
function renderPetHome(){const p=currentPet();if(!p)return renderError('No pet selected');const title=`${petTitle(p)} · Lv ${p.level||1}`;return top(title)+`<div class="body"><div class="petHome"><div class="petArt">${petArtHtml(p)}</div><div class="petStats"><div class="petSub">${esc(p.pet||p.category||'pet')} · XP ${esc(p.xp||0)} · ${state.petIndex+1}/${state.pets.length}</div>${statHtml('🍔','Food',p.hunger)}${statHtml('😊','Happy',p.happiness)}${statHtml('⚡','Energy',p.energy)}${statHtml('➕','Health',p.health)}</div></div></div>`;}
function renderActions(){return top('ACTIONS')+`<div class="body"><div class="actionGrid">${ACTIONS.map((a,i)=>`<div class="menuItem ${i===state.actionIndex?'active':''}" data-action="${i}"><b>${a.icon}</b><span>${esc(a.label)}</span></div>`).join('')}</div></div>`;}
function renderCare(){return top('CARE')+`<div class="body"><div class="actionGrid">${CARE_MENU.map((a,i)=>`<div class="careCard ${i===state.careIndex?'active':''}" data-care="${i}"><b>${a.icon}</b><span>${esc(a.label)}</span></div>`).join('')}</div></div>`;}
function renderGames(){return top('GAMES')+`<div class="body"><div class="panelGrid">${GAME_MENU.map((a,i)=>`<div class="panelCard ${i===state.gameIndex?'active':''}" data-game="${i}"><b>${a.icon}</b>${esc(a.label)}<small>${a.key==='solo'?'Play inside the Tamagotchi':a.key==='team'?'Team quest mode':'Return to actions'}</small></div>`).join('')}</div></div>`;}
function renderPanel(title,text){return top(title)+`<div class="body"><div class="messageCard"><div class="panelTitle">${esc(title)}</div><div class="panelText">${esc(text)}</div><div class="helpText">Back = return · Select = okay</div></div></div>`;}
function renderHabitat(){const p=currentPet();return top('HABITAT')+`<div class="body"><div class="messageCard"><div class="petArt" style="height:70px">${petArtHtml(p)}</div><div class="panelText">${esc(petTitle(p))}'s habitat screen is stable here. Layout layers can be connected next.</div><div class="helpText">Back = return to actions</div></div></div>`;}
function renderWelcome(){return top('WELCOME BOARD')+`<div class="body"><div class="messageCard"><div class="welcomeText">Welcome to Tutorial Town.<br><br>Move with left/right. Select jumps or opens the nearest stop. Siren expands the quest to PC fullscreen. Esc leaves PC fullscreen.</div></div></div>`;}
function renderError(msg){return top('ERROR')+`<div class="body"><div class="messageCard"><div class="error">${esc(msg||state.error||'Something went wrong')}</div><div class="helpText">Back = player picker</div></div></div>`;}
function renderQuest(kind){const pc=kind==='pc';return `<div class="questWrap ${pc?'pc':'mini'}" id="questWrap"><div class="questSky"></div><div class="questHills" id="questHills"></div><div class="questGround" id="questGround"></div><div class="questHud"><span>${esc(state.questMode)}</span><span>Score ${state.quest.score}</span><span>${Math.round(state.quest.distance)}m</span></div><div id="questObjects"></div><div class="questPlayer" id="questPlayer"></div><div class="questCaption" id="questCaption">${esc(state.quest.caption||'Move to a stop. Select opens it. Siren expands.')}</div></div>`;}
function wireClickableCards(){document.querySelectorAll('[data-player]').forEach(el=>el.onclick=()=>{state.pickerIndex=Number(el.dataset.player)||0;selectCurrent()});document.querySelectorAll('[data-action]').forEach(el=>el.onclick=()=>{state.actionIndex=Number(el.dataset.action)||0;selectCurrent()});document.querySelectorAll('[data-game]').forEach(el=>el.onclick=()=>{state.gameIndex=Number(el.dataset.game)||0;selectCurrent()});document.querySelectorAll('[data-care]').forEach(el=>el.onclick=()=>{state.careIndex=Number(el.dataset.care)||0;selectCurrent()});const pass=$('passInput');if(pass){pass.focus();pass.oninput=()=>{state.password=pass.value};pass.onkeydown=e=>{if(e.key==='Enter')selectCurrent()}}}

/* ============================================================
PART 3E - BUTTON RULES
============================================================ */
function moveIndex(delta){
  if(state.screen==='playerPicker'){state.pickerIndex=(state.pickerIndex+delta+PLAYER_LIST.length)%PLAYER_LIST.length;render();return;}
  if(state.screen==='petHome'){state.petIndex=(state.petIndex+delta+state.pets.length)%state.pets.length;render();return;}
  if(state.screen==='actions'){state.actionIndex=(state.actionIndex+delta+ACTIONS.length)%ACTIONS.length;render();return;}
  if(state.screen==='care'){state.careIndex=(state.careIndex+delta+CARE_MENU.length)%CARE_MENU.length;render();return;}
  if(state.screen==='games'){state.gameIndex=(state.gameIndex+delta+GAME_MENU.length)%GAME_MENU.length;render();return;}
  if(state.screen==='embeddedQuest'||state.screen==='pcQuest'){if(delta<0)stepQuestLeft();else stepQuestRight();return;}
}
function selectCurrent(){
  if(state.screen==='playerPicker'){const p=PLAYER_LIST[state.pickerIndex];if(p.test||!p.password){choosePlayer(p)}else{state.password='';state.error='';setScreen('password')}return;}
  if(state.screen==='password'){const p=PLAYER_LIST[state.pickerIndex];if(state.password!==p.password){state.error='Wrong password';state.password='';render();return;}choosePlayer(p);return;}
  if(state.screen==='petHome'){setScreen('actions');return;}
  if(state.screen==='actions'){const a=ACTIONS[state.actionIndex];if(!a)return;setScreen(a.key==='games'?'games':a.key);return;}
  if(state.screen==='care'){const c=CARE_MENU[state.careIndex];toast(c.label+' used on '+petTitle());setScreen('actions');return;}
  if(state.screen==='games'){const g=GAME_MENU[state.gameIndex];if(g.key==='back'){setScreen('actions');return;}startQuest(g.key==='team'?'Team Quest':'Solo Quest');return;}
  if(state.screen==='embeddedQuest'||state.screen==='pcQuest'){questJumpOrInteract();return;}
  if(['shop','inventory','habitat','hook','welcome'].includes(state.screen)){setScreen('actions');return;}
  if(state.screen==='error'){setScreen('playerPicker');return;}
}
function goBack(){
  if(state.screen==='playerPicker')return;
  if(state.screen==='password'||state.screen==='error'){setScreen('playerPicker');return;}
  if(state.screen==='petHome'){setScreen('playerPicker');return;}
  if(state.screen==='actions'){setScreen('petHome');return;}
  if(state.screen==='care'||state.screen==='games'||state.screen==='shop'||state.screen==='inventory'||state.screen==='habitat'||state.screen==='hook'||state.screen==='welcome'){setScreen('actions');return;}
  if(state.screen==='embeddedQuest'){setScreen('games');return;}
  if(state.screen==='pcQuest'){exitPcQuest();return;}
}
function sirenAction(){
  if(state.screen==='embeddedQuest'){enterPcQuest();return;}
  const target=$('app');
  if(document.fullscreenElement){document.exitFullscreen().catch(()=>{});return;}
  if(target&&target.requestFullscreen)target.requestFullscreen().catch(()=>toast('Fullscreen blocked by browser'));
}
$('btnPrev').onclick=()=>moveIndex(-1);$('btnNext').onclick=()=>moveIndex(1);$('btnSelect').onclick=()=>selectCurrent();$('btnBack').onclick=()=>goBack();$('btnSiren').onclick=()=>sirenAction();$('btnPcReturn').onclick=()=>exitPcQuest();

/* ============================================================
PART 3F - QUEST ENGINE
============================================================ */
function startQuest(mode){state.questMode=mode;state.quest={distance:0,playerY:0,velY:0,movingLeft:false,movingRight:false,jumping:false,score:0,caption:'Move to a stop. Select opens it. Siren expands.',near:null,frame:0,last:0};setScreen('embeddedQuest');}
function stepQuestLeft(){state.quest.distance=clamp(state.quest.distance-38,0,2800);state.quest.caption='Moving left';drawQuest();}
function stepQuestRight(){state.quest.distance=clamp(state.quest.distance+38,0,2800);state.quest.caption='Moving right';drawQuest();}
function questJump(){if(state.quest.playerY<=0){state.quest.velY=8.8;state.quest.jumping=true;state.quest.caption='Jump!';}}
function questJumpOrInteract(){const near=findNearQuestObject();if(near){openQuestObject(near);return;}questJump();}
function findNearQuestObject(){const playerWorld=state.quest.distance+190;let best=null,bestD=9999;for(const obj of QUEST_OBJECTS){const d=Math.abs(obj.at-playerWorld);if(d<bestD){best=obj;bestD=d;}}return bestD<125?best:null;}
function openQuestObject(obj){state.quest.caption='Opening '+obj.label;if(state.screen==='pcQuest'){if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});}if(obj.type==='welcome')setScreen('welcome');else if(obj.type==='shop')setScreen('shop');else if(obj.type==='habitat')setScreen('habitat');else if(obj.type==='hook')setScreen('hook');else if(obj.type==='games')setScreen('games');else setScreen('actions');}
async function enterPcQuest(){state.screen='pcQuest';render();await new Promise(r=>requestAnimationFrame(r));const layer=$('pcQuestLayer');if(layer&&layer.requestFullscreen){layer.requestFullscreen().catch(()=>toast('Fullscreen blocked by browser'));}}
function exitPcQuest(){if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});state.screen='embeddedQuest';render();}
document.addEventListener('fullscreenchange',()=>{if(state.screen==='pcQuest'&&!document.fullscreenElement){state.screen='embeddedQuest';render();}});
function drawQuest(){
  const wrap=$('questWrap');if(!wrap)return;
  const q=state.quest;
  const hills=$('questHills'),ground=$('questGround'),player=$('questPlayer'),objects=$('questObjects'),caption=$('questCaption');
  if(hills)hills.style.backgroundPosition=`${-q.distance*.18}px bottom`;
  if(ground)ground.style.backgroundPosition=`${-q.distance*.55}px bottom`;
  if(player){const p=currentPet();const petUrl=imageUrl(p?.url||p?.image_url||'');const sprite=q.jumping?SPRITES.ax.jump:(q.movingLeft||q.movingRight?SPRITES.ax.walk:SPRITES.ax.idle);const url=petUrl||sprite;if(url){player.classList.remove('fallback');player.textContent='';player.style.backgroundImage=`url('${url}')`;}else{player.classList.add('fallback');player.textContent='🚑';player.style.backgroundImage='none';}player.style.bottom=(wrap.classList.contains('pc')?12:15)+q.playerY+'%';player.style.transform=q.movingLeft?'scaleX(-1)':'scaleX(1)';}
  const near=findNearQuestObject();q.near=near?near.key:null;
  if(objects){objects.innerHTML=QUEST_OBJECTS.map(obj=>{const x=(obj.at-q.distance);const pct=x/(wrap.classList.contains('pc')?1600:360)*100;return `<div class="questObject ${near&&near.key===obj.key?'near':''}" style="left:${pct}%"><div class="emoji">${obj.emoji}</div><div class="label">${esc(obj.label)}</div></div>`}).join('');}
  if(caption){caption.textContent=near?`Select opens ${near.label}`:(q.caption||'Move to a stop. Select opens it. Siren expands.');}
}
function questLoop(t){const q=state.quest;if(state.screen==='embeddedQuest'||state.screen==='pcQuest'){const dt=Math.min(40,(t-(q.last||t)));q.last=t;if(q.movingRight)q.distance=clamp(q.distance+dt*.20,0,2800);if(q.movingLeft)q.distance=clamp(q.distance-dt*.20,0,2800);if(q.playerY>0||q.velY>0){q.playerY+=q.velY*dt*.018;q.velY-=dt*.035;if(q.playerY<=0){q.playerY=0;q.velY=0;q.jumping=false;}}drawQuest();}requestAnimationFrame(questLoop)}requestAnimationFrame(questLoop);

/* ============================================================
PART 3G - KEYBOARD CONTROLS
============================================================ */
const keys=new Set();
document.addEventListener('keydown',e=>{
  if(e.target&&['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  const k=e.key.toLowerCase();
  if(['arrowleft','arrowright','arrowup',' ','enter','escape','a','d','w','e'].includes(k))e.preventDefault();
  if(state.screen==='embeddedQuest'||state.screen==='pcQuest'){
    if(k==='arrowleft'||k==='a'){state.quest.movingLeft=true;state.quest.movingRight=false;keys.add(k)}
    else if(k==='arrowright'||k==='d'){state.quest.movingRight=true;state.quest.movingLeft=false;keys.add(k)}
    else if(k==='arrowup'||k==='w'||k===' '){questJump()}
    else if(k==='enter'||k==='e'){questJumpOrInteract()}
    else if(k==='escape'){state.screen==='pcQuest'?exitPcQuest():setScreen('games')}
    return;
  }
  if(k==='arrowleft'||k==='a')moveIndex(-1);
  else if(k==='arrowright'||k==='d')moveIndex(1);
  else if(k==='enter'||k===' ')selectCurrent();
  else if(k==='escape')goBack();
});
document.addEventListener('keyup',e=>{const k=e.key.toLowerCase();keys.delete(k);if(k==='arrowleft'||k==='a')state.quest.movingLeft=false;if(k==='arrowright'||k==='d')state.quest.movingRight=false;});

/* ============================================================
PART 3H - START
============================================================ */
render();
})();
</script>
</body>
</html>
