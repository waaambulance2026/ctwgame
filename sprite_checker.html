<!doctype html><meta charset="utf-8"><title>CTW Sprite Checker</title>
<style>
body{font-family:system-ui;background:#10172a;color:#fff;padding:24px}.card{background:#1b2540;margin:10px 0;padding:12px;border-radius:10px}.ok{color:#39e58c}.bad{color:#ff7272}.warn{color:#ffe66b}code{color:#ffe66b;word-break:break-all}img{max-width:110px;max-height:110px;background:#333;margin-top:8px}button{padding:8px 12px;border-radius:8px;border:0;margin-right:8px}
</style>
<h1>CTW Sprite Checker</h1>
<p>This version does <b>browser public-URL probing</b>. The API only confirms the probe mode; the browser finds the actual working Cloudinary frames.</p>
<button onclick="localStorage.removeItem('ctw-checker-probe-cache-v1');location.reload()">Clear checker cache + reload</button>
<a style="color:#9ee" href="/api/sprite-manifest" target="_blank">Open /api/sprite-manifest</a>
<div id="out">Loading…</div>
<script>
const CLOUD='https://res.cloudinary.com/dpwlfmhia/image/upload/';
const MAX=60, STOP_AFTER_MISSES=2;
const VERSIONS={ax:'v1781797065',pura:'v1781798378',owl:'v1781738357',unicorn:'v1781798498'};
const CHARACTERS={
  ax:['idle','walk','jump'],
  pura:['idle','walk','jump'],
  unicorn:['idle','walk','jump'],
  owl:['idle','walk','jump','play','rest']
};
const BACKGROUNDS={
  'day/sky':['day_sky.png','ctwgame/layers/backgrounds/day_sky.png'],
  'day/hills':['day_hills.png','ctwgame/layers/middle-ground/day_hills.png'],
  'day/ground':['day_ground.png','ctwgame/layers/ground/day_ground.png'],
  'night/sky':['night_sky.png','ctwgame/layers/backgrounds/night_sky.png'],
  'night/hills':['night_hills.png','ctwgame/layers/middle-ground/night_hills.png'],
  'night/ground':['night_ground.png','ctwgame/layers/ground/night_ground.png']
};
function uniq(a){return [...new Set(a.filter(Boolean))]}
function fileName(char,action,n){
  const num=String(n), p2=String(n).padStart(2,'0'), p3=String(n).padStart(3,'0');
  if(char==='owl' && action==='walk') return `owl_walk${p2}.png`;
  if(char==='owl') return `owl_${action}_${num}.png`;
  return `${char}_${action}_${p3}.png`;
}
function urlsFor(char,action,n){
  const f=fileName(char,action,n), v=VERSIONS[char]||'';
  return uniq([
    `${CLOUD}f_auto,q_auto,w_384/${f}`,
    `${CLOUD}${f}`,
    v && `${CLOUD}f_auto,q_auto,w_384/${v}/${f}`,
    v && `${CLOUD}${v}/${f}`,
  ]);
}
function bgUrls(name){return uniq((BACKGROUNDS[name]||[]).flatMap(f=>[`${CLOUD}f_auto,q_auto,w_1800/${f}`,`${CLOUD}${f}`]));}
function imgOk(src,timeout=1800){return new Promise(r=>{const i=new Image();let done=false;const finish=v=>{if(done)return;done=true;r(v?src:null)};const t=setTimeout(()=>finish(null),timeout);i.onload=()=>{clearTimeout(t);finish(true)};i.onerror=()=>{clearTimeout(t);finish(null)};i.src=src+(src.includes('?')?'&':'?')+'ctwcheck='+Date.now();});}
async function firstWorking(list){
  for(let start=0;start<list.length;start+=4){
    const results=await Promise.all(list.slice(start,start+4).map(u=>imgOk(u)));
    const hit=results.find(Boolean); if(hit) return hit.replace(/([?&])ctwcheck=\d+$/,'');
  }
  return null;
}
async function discover(char,action){
  const frames=[]; let misses=0;
  for(let n=1;n<=MAX;n++){
    const hit=await firstWorking(urlsFor(char,action,n));
    if(hit){frames.push(hit);misses=0;} else {misses++; if(frames.length && misses>=STOP_AFTER_MISSES) break; if(!frames.length && misses>=STOP_AFTER_MISSES) break;}
  }
  return frames;
}
(async()=>{
  const out=document.getElementById('out'); out.innerHTML='';
  let api=null; try{api=await (await fetch('/api/sprite-manifest?ctw='+Date.now(),{cache:'no-store'})).json();}catch(e){}
  out.innerHTML+=`<div class="card ${api&&api.ok?'ok':'warn'}">API mode: <code>${api?.mode||'not loaded'}</code><br>This is expected to have empty frame arrays in the public-probe build. Counts below are found by this browser page.</div>`;
  for(const name of Object.keys(BACKGROUNDS)){
    const u=await firstWorking(bgUrls(name));
    out.innerHTML+=`<div class="card ${u?'ok':'bad'}">background ${name}: ${u?'OK':'MISSING'}<br><code>${u||''}</code>${u?`<br><img src="${u}">`:''}</div>`;
  }
  for(const [char,actions] of Object.entries(CHARACTERS)){
    for(const action of actions){
      const frames=await discover(char,action);
      const first=frames[0]||'';
      out.innerHTML+=`<div class="card ${frames.length?'ok':'bad'}">${char}/${action}: ${frames.length} frame(s), first ${first?'OK':'MISSING'}<br><code>${first}</code>${first?`<br><img src="${first}">`:''}</div>`;
    }
  }
})();
</script>
