<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Waaambulance PetBot Test</title>
<!-- ============================================================
PETBOT TEST SECTION START
Safe standalone test page. Upload as petbot_test.html when testing.
This does not touch game movement, sprites, ground, buildings or levels.
============================================================ -->
<style>
:root{
  --red:#ef3f3f;
  --darkRed:#c9202d;
  --pink:#ff63b7;
  --hotPink:#ff2f9b;
  --softPink:#ffe2f3;
  --blue:#35c7f4;
  --deepBlue:#0774d8;
  --darkBlue:#092a66;
  --yellow:#ffd957;
  --cream:#fff9f1;
  --ink:#201026;
  --glass:#dff8ff;
  --shellShadow:rgba(26,12,32,.38);
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
body{
  background:
    radial-gradient(circle at 18% 18%,rgba(255,99,183,.55),transparent 22%),
    radial-gradient(circle at 84% 12%,rgba(53,199,244,.58),transparent 24%),
    radial-gradient(circle at 52% 100%,rgba(255,217,87,.28),transparent 30%),
    linear-gradient(135deg,#ffe2f3 0%,#b9edff 48%,#ffe2f3 100%);
}
button,select{font-family:inherit} button{cursor:pointer}
.page{position:fixed;inset:0;width:100vw;height:100dvh;display:grid;place-items:stretch;padding:0;overflow:hidden}
.petbotShell{
  width:100vw;height:100dvh;border-radius:0;padding:clamp(8px,1.2vw,18px);position:relative;overflow:hidden;
  background:
    linear-gradient(90deg,var(--red) 0 7%,#fff8f1 7% 93%,var(--red) 93% 100%);
  border:clamp(7px,1vw,13px) solid var(--red);
  box-shadow:
    inset 0 0 0 4px rgba(255,255,255,.75),
    inset 0 -28px 60px rgba(120,13,24,.22),
    inset 0 28px 36px rgba(255,255,255,.28),
    0 0 26px rgba(255,99,183,.78),
    0 0 42px rgba(53,199,244,.72);
}
.petbotShell::before{
  content:"";position:absolute;inset:-18%;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 16% 20%,rgba(255,255,255,.7),transparent 10%),
    radial-gradient(circle at 84% 18%,rgba(255,255,255,.5),transparent 12%),
    linear-gradient(120deg,rgba(255,255,255,.35),transparent 35% 65%,rgba(255,255,255,.2));
  mix-blend-mode:screen;opacity:.65;
}
.petbotShell::after{
  content:"";position:absolute;inset:10px;border-radius:28px;pointer-events:none;z-index:5;
  box-shadow:inset 0 0 22px rgba(255,255,255,.75),inset 0 -18px 32px rgba(0,0,0,.08);
}
.petbotInner{
  position:relative;z-index:1;width:100%;height:100%;display:grid;
  grid-template-columns:clamp(84px,9vw,150px) minmax(0,1fr) clamp(84px,9vw,150px);
  grid-template-rows:auto minmax(0,1fr) auto;gap:clamp(8px,1vw,14px);align-items:stretch;
}
.topBar{grid-column:1/-1;display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;padding:0 clamp(70px,8vw,125px)}
.logo{text-align:center;font-weight:1000;font-size:clamp(28px,3.8vw,58px);line-height:.9;color:var(--red);letter-spacing:-2px;text-shadow:0 3px 0 #fff,0 6px 0 var(--blue),0 12px 18px rgba(0,0,0,.22)}
.logo span{display:block;color:var(--blue);font-size:.67em;text-shadow:0 3px 0 #fff,0 6px 0 rgba(239,63,63,.7),0 10px 16px rgba(0,0,0,.18)}
.testBadge{justify-self:start;background:linear-gradient(180deg,#fff6a9,var(--yellow));border:3px solid #fff;border-radius:999px;padding:8px 14px;font-weight:1000;box-shadow:0 7px 0 #c59713,0 9px 18px rgba(0,0,0,.18)}
.backLink{justify-self:end;text-decoration:none;color:white;background:linear-gradient(180deg,#3b1d48,#1d0d24);border-radius:999px;padding:11px 16px;font-weight:1000;box-shadow:0 7px 0 rgba(0,0,0,.28),0 0 18px rgba(255,99,183,.38)}
.siren{height:clamp(42px,5.8vh,62px);display:flex;gap:5px;align-items:center;justify-content:center;background:linear-gradient(180deg,#353b46,#10131a);border-radius:13px;padding:6px;box-shadow:inset 0 0 0 4px rgba(255,255,255,.18),0 10px 18px rgba(0,0,0,.25),0 0 16px rgba(53,199,244,.4)}
.light{width:clamp(38px,4.1vw,60px);height:clamp(26px,3.8vh,42px);border-radius:8px;background:#fff;box-shadow:inset 0 -9px 10px rgba(0,0,0,.22),inset 0 8px 10px rgba(255,255,255,.55),0 0 18px rgba(255,255,255,.5)}
.light.red{background:#ef3f3f;box-shadow:inset 0 -9px 10px rgba(0,0,0,.2),0 0 20px rgba(239,63,63,.9)}.light.blue{background:#258df3;box-shadow:inset 0 -9px 10px rgba(0,0,0,.2),0 0 20px rgba(53,199,244,.95)}.light.white{background:#f5f7ff}
.sideRail{display:flex;flex-direction:column;align-items:center;justify-content:space-around;gap:12px;padding:8px 4px;min-height:0}.sideIcon{width:clamp(62px,7.4vw,104px);height:clamp(62px,7.4vw,104px);border-radius:28px;display:grid;place-items:center;background:linear-gradient(180deg,#fff,#dff8ff);border:5px solid var(--blue);font-size:clamp(30px,3.3vw,50px);box-shadow:0 10px 0 #128cc6,0 16px 24px rgba(0,0,0,.2),0 0 18px rgba(53,199,244,.65)}.sideIcon.pink{border-color:var(--pink);background:linear-gradient(180deg,#fff,#ffe4f4);box-shadow:0 10px 0 #d24494,0 16px 24px rgba(0,0,0,.2),0 0 22px rgba(255,99,183,.75)}
.speaker{width:clamp(50px,5vw,86px);display:grid;gap:8px}.speaker i{display:block;height:8px;border-radius:999px;background:#291521;opacity:.85;box-shadow:0 2px 0 rgba(255,255,255,.35)}
.dpad{width:clamp(72px,8.5vw,124px);height:clamp(72px,8.5vw,124px);border-radius:34px;background:linear-gradient(180deg,#ff7a8d,#e93042);position:relative;border:5px solid #d91f32;box-shadow:0 11px 0 #a61927,0 19px 25px rgba(0,0,0,.24),0 0 22px rgba(255,99,183,.55)}
.dpad::before,.dpad::after{content:"";position:absolute;background:#ffd0d8;border-radius:18px}.dpad::before{left:15%;right:15%;top:35%;height:30%}.dpad::after{top:15%;bottom:15%;left:35%;width:30%}
.heartBtn{width:clamp(62px,7vw,92px);height:clamp(58px,6.2vw,78px);border-radius:34px;background:linear-gradient(180deg,#ff9fd2,#ff4eaa);display:grid;place-items:center;color:white;font-size:clamp(30px,3.2vw,40px);border:5px solid white;box-shadow:0 10px 0 #d24494,0 16px 22px rgba(0,0,0,.18),0 0 22px rgba(255,99,183,.7)}
.screenWrap{min-width:0;min-height:0;background:linear-gradient(180deg,#24314d,#101827);border:clamp(7px,1vw,12px) solid #111827;border-radius:32px;padding:clamp(7px,1vw,14px);box-shadow:inset 0 0 0 4px rgba(255,255,255,.17),0 18px 30px rgba(0,0,0,.35),0 0 28px rgba(255,99,183,.8),0 0 46px rgba(53,199,244,.72)}
.petScreen{height:100%;min-height:0;border-radius:22px;overflow:hidden;background:linear-gradient(180deg,#dff8ff,#fff);display:grid;grid-template-rows:auto minmax(0,1fr) auto;position:relative;box-shadow:inset 0 0 0 4px rgba(255,255,255,.7)}
.petScreen::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.48),transparent 24% 70%,rgba(255,255,255,.22));mix-blend-mode:screen}.screenTop{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px;background:linear-gradient(180deg,#f6fcff,#bdefff);border-bottom:4px solid rgba(54,189,242,.45);position:relative;z-index:2}.selector{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.selector button,.selector select{border:0;border-radius:999px;padding:9px 12px;font-weight:1000;background:white;color:#251326;box-shadow:0 5px 0 rgba(13,98,173,.18)}.selector button{background:linear-gradient(180deg,#fff4a4,var(--yellow))}.petName{font-size:clamp(16px,1.6vw,22px);font-weight:1000;color:#0d62ad}.heartScore{display:flex;align-items:center;gap:6px;background:linear-gradient(180deg,#168bdd,#0d62ad);color:white;border-radius:999px;padding:7px 12px;font-weight:1000;font-size:clamp(16px,1.6vw,22px);box-shadow:0 0 16px rgba(53,199,244,.55)}
.habitatScene{position:relative;display:grid;grid-template-columns:clamp(188px,24vw,285px) minmax(0,1fr);gap:12px;padding:12px;background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,.15)),var(--habitat-bg,linear-gradient(180deg,#c4f3ff,#ffe4f4));overflow:hidden;min-height:0}.habitatScene::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 76%,rgba(255,255,255,.55) 0 13%,transparent 14%),linear-gradient(90deg,rgba(255,255,255,.12),transparent 20% 80%,rgba(255,255,255,.14));pointer-events:none}.statsPanel{position:relative;z-index:2;display:grid;gap:8px;align-content:start;background:linear-gradient(180deg,rgba(13,98,173,.97),rgba(8,67,140,.97));border:4px solid rgba(255,255,255,.85);border-radius:22px;padding:12px;color:white;box-shadow:0 10px 20px rgba(0,0,0,.22),0 0 18px rgba(53,199,244,.5)}.stat{display:grid;grid-template-columns:42px 1fr;gap:8px;align-items:center}.statEmoji{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;background:white;color:#251326;font-size:23px;box-shadow:0 4px 0 rgba(0,0,0,.12)}.stat label{display:block;font-weight:1000;margin-bottom:3px}.bar{height:20px;border-radius:999px;background:rgba(255,255,255,.35);overflow:hidden;border:2px solid rgba(255,255,255,.65)}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#ff74bc,#ffd957);width:50%;transition:.2s}.bar.green span{background:linear-gradient(90deg,#36d67a,#9dffb6)}.bar.blue span{background:linear-gradient(90deg,#36bdf2,#aeefff)}.levelBadge{background:linear-gradient(180deg,#ff85c9,#f052a9);border:3px solid white;border-radius:18px;padding:8px;text-align:center;font-weight:1000;font-size:20px;box-shadow:0 6px 0 rgba(0,0,0,.16)}
.petStage{position:relative;z-index:2;display:grid;place-items:center;min-height:0}.roomCard{position:absolute;inset:clamp(10px,2vw,22px);border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.66),rgba(255,255,255,.18));box-shadow:inset 0 -45px 0 rgba(210,130,194,.18),0 0 24px rgba(255,255,255,.38);border:4px solid rgba(255,255,255,.65)}.petImage{position:relative;z-index:3;max-width:min(43vw,420px);max-height:min(45vh,390px);object-fit:contain;filter:drop-shadow(0 26px 18px rgba(0,0,0,.32));transition:transform .2s ease}.petImage.bounce{animation:bounce .65s ease}.petImage.sleep{animation:sleepy 1.2s ease}.petImage.heal{animation:healPulse .7s ease}.effectBubble{position:absolute;z-index:4;top:28px;right:34px;font-size:54px;opacity:0;transform:translateY(8px) scale(.8);transition:.2s}.effectBubble.show{opacity:1;transform:translateY(0) scale(1)}
@keyframes bounce{0%,100%{transform:translateY(0)}35%{transform:translateY(-24px) rotate(-3deg)}70%{transform:translateY(0) rotate(3deg)}}@keyframes sleepy{0%,100%{transform:rotate(0)}40%{transform:rotate(-5deg) translateY(10px)}}@keyframes healPulse{0%,100%{filter:drop-shadow(0 26px 18px rgba(0,0,0,.32))}50%{filter:drop-shadow(0 26px 18px rgba(0,0,0,.32)) drop-shadow(0 0 30px rgba(54,214,122,.95)) drop-shadow(0 0 50px rgba(255,99,183,.65))}}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding:11px;background:linear-gradient(180deg,#c8efff,#83dcf7);border-top:4px solid rgba(13,98,173,.3);position:relative;z-index:2}.toyBtn{border:0;border-radius:18px;padding:9px 6px;background:linear-gradient(180deg,#fff,#dff8ff);box-shadow:0 7px 0 #168bdd,0 10px 15px rgba(0,0,0,.18),0 0 14px rgba(53,199,244,.45);font-weight:1000;color:#251326;font-size:clamp(13px,1.2vw,16px)}.toyBtn span{display:block;font-size:clamp(24px,2.5vw,32px);line-height:1}.toyBtn.pink{box-shadow:0 7px 0 #d24494,0 10px 15px rgba(0,0,0,.18),0 0 16px rgba(255,99,183,.55);background:linear-gradient(180deg,#fff,#ffe4f4)}.toyBtn.yellow{box-shadow:0 7px 0 #c89512,0 10px 15px rgba(0,0,0,.18),0 0 14px rgba(255,217,87,.6);background:linear-gradient(180deg,#fff9c9,#ffd957)}.toyBtn:active{transform:translateY(5px);box-shadow:0 2px 0 #168bdd}.message{position:absolute;left:50%;bottom:88px;z-index:6;transform:translateX(-50%);background:rgba(37,19,38,.94);color:white;border-radius:999px;padding:10px 16px;font-weight:1000;opacity:0;pointer-events:none;transition:.2s;text-align:center;max-width:90%;box-shadow:0 0 18px rgba(255,99,183,.55)}.message.show{opacity:1;bottom:100px}.pacifier{position:absolute;z-index:4;left:50%;bottom:clamp(-16px,-1.6vh,-6px);transform:translateX(-50%);width:clamp(130px,15vw,230px);height:clamp(58px,7vw,102px);border-radius:999px;background:linear-gradient(180deg,#ff9bd0,#f4419f);border:6px solid rgba(255,255,255,.92);box-shadow:0 12px 0 #cf2679,0 20px 28px rgba(0,0,0,.22),0 0 30px rgba(255,99,183,.8)}.pacifier::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);width:38%;height:58%;border-radius:999px;background:linear-gradient(180deg,#ffccd4,#ff4d74);box-shadow:inset 0 -10px 14px rgba(134,20,46,.22)}.pacifier::after{content:"";position:absolute;left:12%;right:12%;top:52%;height:24%;border-radius:999px;border:7px solid #53172d;border-top:0;opacity:.85}.dataNote{grid-column:1/-1;background:rgba(255,255,255,.75);border:3px dashed rgba(13,98,173,.35);border-radius:20px;padding:8px 12px;font-size:12px;line-height:1.25}.dataNote b{color:#0d62ad}
@media(max-width:980px){.petbotInner{grid-template-columns:1fr;grid-template-rows:auto minmax(0,1fr) auto}.sideRail{display:none}.topBar{padding:0 4px 6px;grid-template-columns:auto 1fr auto}.testBadge{font-size:11px;padding:6px 9px}.backLink{font-size:12px;padding:8px 10px}.screenWrap{border-width:6px;padding:7px}.habitatScene{grid-template-columns:1fr}.statsPanel{grid-template-columns:1fr 1fr}.levelBadge{grid-column:1/-1}.actions{grid-template-columns:repeat(4,1fr)}.petImage{max-height:34vh;max-width:62vw}.petbotShell{background:linear-gradient(180deg,#fff8f1 0 88%,var(--red) 88% 100%)}.dataNote{display:none}.pacifier{display:none}}
@media(max-width:620px){.petbotShell{padding:6px}.logo{font-size:22px;letter-spacing:-1px}.siren{height:34px}.light{height:22px;width:34px}.topBar{grid-template-columns:1fr auto}.testBadge{display:none}.backLink{font-size:11px}.screenTop{display:grid;grid-template-columns:1fr;gap:6px}.petName,.heartScore{justify-self:center}.statsPanel{grid-template-columns:1fr 1fr;gap:6px;padding:8px}.stat{grid-template-columns:30px 1fr}.statEmoji{width:30px;height:30px;font-size:18px;border-radius:10px}.bar{height:15px}.stat label{font-size:12px}.habitatScene{padding:8px;gap:8px}.actions{grid-template-columns:repeat(2,1fr);gap:7px;padding:8px}.toyBtn{border-radius:15px;padding:8px 4px}.petImage{max-height:28vh;max-width:75vw}.roomCard{inset:7px;border-radius:22px}.screenWrap{border-radius:22px}.petScreen{border-radius:16px}}
@media(max-height:640px) and (min-width:981px){.topBar{padding-bottom:2px}.logo{font-size:32px}.siren{height:38px}.sideIcon{width:66px;height:66px;font-size:32px}.dpad{width:72px;height:72px}.heartBtn{width:66px;height:56px}.actions{padding:7px}.toyBtn{padding:6px 4px}.toyBtn span{font-size:22px}.statsPanel{gap:5px}.statEmoji{width:34px;height:34px;font-size:20px}.bar{height:16px}.petImage{max-height:34vh}.dataNote{display:none}.pacifier{display:none}}
</style>
</head>
<body>
<main class="page">
  <section class="petbotShell" aria-label="Waaambulance PetBot test device">
    <div class="petbotInner">
      <div class="topBar">
        <div class="testBadge">TEST PAGE</div>
        <div>
          <div class="siren" aria-hidden="true"><i class="light blue"></i><i class="light white"></i><i class="light red"></i><i class="light white"></i><i class="light blue"></i></div>
          <div class="logo"><span>Waaambulance</span>PetBot</div>
        </div>
        <a class="backLink" href="index.html">← Back to game</a>
      </div>

      <aside class="sideRail" aria-hidden="true">
        <div class="sideIcon pink">🐾</div>
        <div class="sideIcon">🚑</div>
        <div class="speaker"><i></i><i></i><i></i></div>
        <div class="heartBtn">♡</div>
      </aside>

      <section class="screenWrap">
        <div class="petScreen">
          <div class="screenTop">
            <div class="selector">
              <button id="prevPet" type="button">←</button>
              <select id="petSelect" aria-label="Choose pet"></select>
              <button id="nextPet" type="button">→</button>
            </div>
            <div class="petName" id="petTitle">Pet name</div>
            <div class="heartScore">💗 <span id="petScore">000</span></div>
          </div>

          <div class="habitatScene" id="habitatScene">
            <aside class="statsPanel">
              <div class="levelBadge">LV. <span id="petLevel">01</span></div>
              <div class="stat"><div class="statEmoji">🍔</div><div><label>Hunger</label><div class="bar"><span id="hungerBar"></span></div></div></div>
              <div class="stat"><div class="statEmoji">😊</div><div><label>Happy</label><div class="bar"><span id="happyBar"></span></div></div></div>
              <div class="stat"><div class="statEmoji">⚡</div><div><label>Energy</label><div class="bar blue"><span id="energyBar"></span></div></div></div>
              <div class="stat"><div class="statEmoji">💊</div><div><label>Health</label><div class="bar green"><span id="healthBar"></span></div></div></div>
            </aside>
            <div class="petStage">
              <div class="roomCard"></div>
              <div class="effectBubble" id="effectBubble">✨</div>
              <img class="petImage" id="petImage" alt="Selected pet">
              <div class="message" id="message">PetBot ready</div>
            </div>
          </div>

          <div class="actions">
            <button class="toyBtn yellow" data-action="feed"><span>🍔</span>Feed</button>
            <button class="toyBtn pink" data-action="play"><span>🧸</span>Play</button>
            <button class="toyBtn" data-action="rest"><span>🌙</span>Rest</button>
            <button class="toyBtn pink" data-action="heal"><span>💊</span>Heal</button>
            <button class="toyBtn" data-action="train"><span>🏋️</span>Train</button>
            <button class="toyBtn yellow" data-action="explore"><span>🧭</span>Explore</button>
            <button class="toyBtn pink" data-action="main"><span>⭐</span>Use Main</button>
            <button class="toyBtn" data-action="side"><span>🐾</span>Use Side</button>
          </div>
        </div>
      </section>

      <aside class="sideRail" aria-hidden="true">
        <div class="sideIcon pink">💗</div>
        <div class="dpad"></div>
        <div class="speaker"><i></i><i></i><i></i></div>
        <div class="sideIcon">💧</div>
      </aside>

      <div class="dataNote"><b>Safe test build:</b> sample pets only for layout testing. Later this can connect to <b>Sheet 51</b> for pet images and <b>user_habitat_layout</b> for habitat rooms.</div>
    </div>
    <div class="pacifier" aria-hidden="true"></div>
  </section>
</main>
<script>
// PETBOT TEST SECTION START - sample data first, real sheet/API hooks later.
const SAMPLE_PETS=[
  {id:'axolotl_pink',name:'Bubbles',type:'Axolotl',level:5,score:128,hunger:72,happy:84,energy:56,health:92,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781797059/ax_idle_001.png',bg:'linear-gradient(180deg,#c8f7ff,#ffd9ef)'},
  {id:'pura_friend',name:'Pura Pal',type:'Mascot',level:7,score:216,hunger:64,happy:91,energy:70,health:86,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798378/pura_idle_001.png',bg:'linear-gradient(180deg,#fff4c8,#c9f6ff)'},
  {id:'owl_soft',name:'Moonbean',type:'Owl',level:3,score:73,hunger:58,happy:66,energy:44,health:80,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1782133620/owl_idle_001.png',bg:'linear-gradient(180deg,#d8d2ff,#ecf9ff)'}
];
let currentIndex=0;
const $=id=>document.getElementById(id);
const clamp=n=>Math.max(0,Math.min(100,Number(n)||0));
function setBar(id,value){$(id).style.width=clamp(value)+'%'}
function showMessage(text,emoji='✨'){
  const msg=$('message'), bubble=$('effectBubble');
  msg.textContent=text; msg.classList.add('show');
  bubble.textContent=emoji; bubble.classList.add('show');
  clearTimeout(showMessage.t); showMessage.t=setTimeout(()=>{msg.classList.remove('show');bubble.classList.remove('show')},1400);
}
function renderPet(){
  const pet=SAMPLE_PETS[currentIndex];
  $('petTitle').textContent=pet.name+' · '+pet.type;
  $('petLevel').textContent=String(pet.level).padStart(2,'0');
  $('petScore').textContent=pet.score;
  $('petImage').src=pet.img;
  $('petImage').alt=pet.name;
  $('habitatScene').style.setProperty('--habitat-bg',pet.bg);
  setBar('hungerBar',pet.hunger);setBar('happyBar',pet.happy);setBar('energyBar',pet.energy);setBar('healthBar',pet.health);
  $('petSelect').value=pet.id;
  showMessage(pet.name+' is ready','💗');
}
function buildSelect(){
  $('petSelect').innerHTML=SAMPLE_PETS.map(p=>`<option value="${p.id}">${p.name} · ${p.type}</option>`).join('');
  $('petSelect').onchange=e=>{currentIndex=Math.max(0,SAMPLE_PETS.findIndex(p=>p.id===e.target.value));renderPet()};
}
function nudge(stat,amount){const pet=SAMPLE_PETS[currentIndex];pet[stat]=clamp(pet[stat]+amount);renderPet()}
function animatePet(cls){const img=$('petImage');img.classList.remove('bounce','sleep','heal');void img.offsetWidth;img.classList.add(cls);setTimeout(()=>img.classList.remove(cls),900)}
function handleAction(action){
  const pet=SAMPLE_PETS[currentIndex];
  if(action==='feed'){nudge('hunger',12);animatePet('bounce');showMessage(pet.name+' enjoyed food','🍔')}
  if(action==='play'){nudge('happy',12);nudge('energy',-5);animatePet('bounce');showMessage(pet.name+' played','🧸')}
  if(action==='rest'){nudge('energy',16);animatePet('sleep');showMessage(pet.name+' is resting','💤')}
  if(action==='heal'){nudge('health',14);animatePet('heal');showMessage(pet.name+' feels better','💊')}
  if(action==='train'){nudge('energy',-7);nudge('happy',6);animatePet('bounce');showMessage(pet.name+' trained','🏋️')}
  if(action==='explore'){nudge('happy',8);nudge('energy',-8);animatePet('bounce');showMessage(pet.name+' went exploring','🧭')}
  if(action==='main'){localStorage.setItem('ctw_petbot_test_main_pet',pet.id);showMessage(pet.name+' saved as main pet','⭐')}
  if(action==='side'){localStorage.setItem('ctw_petbot_test_side_pet',pet.id);showMessage(pet.name+' saved as sidekick','🐾')}
}
document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',()=>handleAction(btn.dataset.action)));
$('prevPet').onclick=()=>{currentIndex=(currentIndex-1+SAMPLE_PETS.length)%SAMPLE_PETS.length;renderPet()};
$('nextPet').onclick=()=>{currentIndex=(currentIndex+1)%SAMPLE_PETS.length;renderPet()};
buildSelect();renderPet();
// PETBOT TEST SECTION END
</script>
</body>
</html>
