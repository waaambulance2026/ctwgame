<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Waaambulance PetBot</title>
<style>
:root{--pink:#f35aad;--blue:#18b9ea;--ink:#24152e;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at 50% 40%,#fff 0,#fff0fa 44%,#dff4ff 100%);color:var(--ink)}button{font:inherit;border:0;cursor:pointer;background:none}.app{position:relative;width:100vw;height:100dvh;overflow:hidden;display:grid;place-items:center}.stage{position:relative;width:min(95vw,calc(96dvh * .80));height:min(96dvh,calc(95vw * 1.249));max-width:900px;max-height:1124px;filter:drop-shadow(0 20px 38px rgba(0,0,0,.18)) drop-shadow(0 0 32px rgba(243,90,173,.28)) drop-shadow(0 0 26px rgba(24,185,234,.18))}.device{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;user-select:none;-webkit-user-drag:none}.lcd{position:absolute;left:19%;top:32%;width:62%;height:33%;border-radius:5%/8%;overflow:hidden;background:#b9c989;border:3px solid rgba(54,69,28,.62);box-shadow:inset 0 0 0 2px rgba(255,255,255,.15),inset 0 0 36px rgba(0,0,0,.08)}.lcd:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.055) 1px,transparent 1px);background-size:10px 10px;opacity:.55;pointer-events:none}.lcdTop{position:relative;z-index:2;display:flex;justify-content:space-between;gap:8px;padding:8px 10px 0;font-weight:1000;font-size:clamp(12px,1.35vw,18px)}#petName{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%}.petArea{position:absolute;left:0;right:0;top:22%;bottom:15%;display:grid;place-items:center;z-index:2}.petImg{max-width:56%;max-height:94%;object-fit:contain;filter:grayscale(1) contrast(2.2) sepia(.36) saturate(.5) brightness(.74);mix-blend-mode:multiply;opacity:.98}.bars{position:absolute;left:8px;right:8px;bottom:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:2}.bar{height:clamp(8px,1.15vw,12px);border:2px solid rgba(42,55,25,.75);border-radius:999px;background:rgba(42,55,25,.18);overflow:hidden}.bar span{display:block;height:100%;width:50%;background:#2f451f}.msg{position:absolute;z-index:16;left:50%;bottom:8.4%;transform:translateX(-50%);max-width:74%;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.9);border:2px solid rgba(24,185,234,.42);box-shadow:0 8px 18px rgba(0,0,0,.12);font-size:clamp(11px,1.15vw,14px);font-weight:900;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bubble{position:absolute;z-index:18;left:50%;top:24%;transform:translateX(-50%) scale(.94);padding:8px 12px;border-radius:999px;background:linear-gradient(#fff,#ffe2f2);border:3px solid var(--pink);box-shadow:0 0 18px rgba(243,90,173,.72),0 8px 16px rgba(0,0,0,.14);font-size:clamp(12px,1.5vw,18px);font-weight:1000;opacity:0;pointer-events:none}.bubble.show{animation:pop 1s ease}@keyframes pop{0%{opacity:0;transform:translateX(-50%) translateY(12px) scale(.85)}15%,80%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-8px) scale(.95)}}.hot{position:absolute;z-index:20;border-radius:999px;background:rgba(255,255,255,.001)}.hot:focus-visible{outline:3px solid rgba(255,230,111,.95)}.hot:after{content:"";position:absolute;inset:-6px;border-radius:inherit;opacity:0;transition:.12s;pointer-events:none}.hot:hover:after,.hot.press:after,.hot:focus-visible:after{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.55),0 0 18px rgba(243,90,173,.75),0 0 24px rgba(24,185,234,.6)}.hot.press{transform:scale(.94)}.back{left:39.3%;top:10.6%;width:21.6%;height:10.5%;border-radius:18px}.explore{left:18%;top:2.3%;width:64%;height:10.6%;border-radius:24px}.feed{left:15.1%;top:72.2%;width:15.9%;height:10.2%}.heal{left:68.8%;top:72.2%;width:15.9%;height:10.2%}.prev{left:31.2%;top:82.1%;width:9.6%;height:7.2%;border-radius:34%}.next{left:59.2%;top:82.1%;width:9.6%;height:7.2%;border-radius:34%}.play{left:40.1%;top:68%;width:20.2%;height:17.1%;border-radius:42%}.rest{left:44.6%;top:84.1%;width:10.8%;height:8.3%;border-radius:42%}.useMain{left:8.6%;top:55.2%;width:10.9%;height:12.8%;border-radius:22px}.useSide{left:80.4%;top:55.2%;width:10.9%;height:12.8%;border-radius:22px}.info{left:19%;top:32%;width:62%;height:33%;border-radius:5%/8%}@media(max-width:700px){.stage{width:min(99vw,calc(94dvh * .80));height:min(94dvh,calc(99vw * 1.249))}.msg{bottom:5.6%;max-width:86%;font-size:10px}.lcdTop{font-size:11px;padding:7px 8px 0}}@media(max-height:720px){.stage{width:min(88vw,calc(97dvh * .80));height:min(97dvh,calc(88vw * 1.249))}}
</style>
</head><body><div class="app"><main class="stage" aria-label="Waaambulance PetBot toy"><img class="device" src="petbot_device.png" alt="Waaambulance PetBot toy"><section class="lcd"><div class="lcdTop"><span>♡ <b id="loveScore">128</b></span><span id="petName">Bubbles · Axolotl</span><span>☩ ☺ ⚙</span></div><div class="petArea"><img id="petImg" class="petImg" alt="selected pet"><div id="petFallback" hidden>🚑</div></div><div class="bars"><div class="bar"><span id="hungerBar"></span></div><div class="bar"><span id="happyBar"></span></div><div class="bar"><span id="energyBar"></span></div><div class="bar"><span id="healthBar"></span></div></div></section><div class="bubble" id="bubble">Ready!</div><div class="msg" id="msg">Use the toy buttons only</div><button class="hot explore" data-action="explore" aria-label="Explore"></button><button class="hot back" data-action="back" aria-label="Back to game"></button><button class="hot feed" data-action="feed" aria-label="Feed"></button><button class="hot heal" data-action="heal" aria-label="Heal"></button><button class="hot prev" data-action="prev" aria-label="Previous pet"></button><button class="hot next" data-action="next" aria-label="Next pet"></button><button class="hot play" data-action="play" aria-label="Play"></button><button class="hot rest" data-action="rest" aria-label="Rest"></button><button class="hot useMain" data-action="useMain" aria-label="Use as main"></button><button class="hot useSide" data-action="useSide" aria-label="Use as sidekick"></button><button class="hot info" data-action="info" aria-label="Pet info"></button></main></div><script>
const pets=[{name:'Bubbles',type:'Axolotl',level:5,love:128,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781797059/ax_idle_001.png',hunger:68,happy:80,energy:48,health:90},{name:'Pura',type:'Mascot',level:7,love:211,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798378/pura_idle_001.png',hunger:78,happy:72,energy:65,health:86},{name:'Moonbeam',type:'Unicorn',level:4,love:95,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798484/unicorn_idle_001.png',hunger:52,happy:60,energy:82,health:75},{name:'Hoots',type:'Owl',level:3,love:84,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1782133620/owl_idle_001.png',hunger:58,happy:63,energy:74,health:80}];let idx=0;const $=id=>document.getElementById(id);const clamp=v=>Math.max(0,Math.min(100,v));function setBar(id,v){$(id).style.width=clamp(v)+'%'}function show(t){const b=$('bubble');b.textContent=t;b.classList.remove('show');void b.offsetWidth;b.classList.add('show')}function render(){const p=pets[idx];$('loveScore').textContent=p.love;$('petName').textContent=p.name+' · '+p.type;$('petImg').src=p.img;setBar('hungerBar',p.hunger);setBar('happyBar',p.happy);setBar('energyBar',p.energy);setBar('healthBar',p.health);$('msg').textContent=p.name+' · LV '+String(p.level).padStart(2,'0')+' · hearts feed/heal · arrows switch · pacifier plays'}function changePet(d){idx=(idx+d+pets.length)%pets.length;render();show('Pet changed 🐾')}function act(a){const p=pets[idx];if(a==='prev')return changePet(-1);if(a==='next')return changePet(1);if(a==='back'){location.href='index.html';return}if(a==='feed'){p.hunger=clamp(p.hunger+12);p.energy=clamp(p.energy-3);p.love++;show('Fed! 🍔')}else if(a==='heal'){p.health=clamp(p.health+12);p.love+=2;show('Healed! 💊')}else if(a==='play'){p.happy=clamp(p.happy+12);p.energy=clamp(p.energy-6);p.love+=3;show('Play time! 🎈')}else if(a==='rest'){p.energy=clamp(p.energy+16);p.hunger=clamp(p.hunger-4);show('Resting 🌙')}else if(a==='explore'){p.happy=clamp(p.happy+6);p.energy=clamp(p.energy-6);p.love+=2;show('Exploring! 🧭')}else if(a==='useMain'){show('Use as main ⭐')}else if(a==='useSide'){show('Use as sidekick 🐾')}else if(a==='info'){show(p.name+' H'+p.hunger+' 🙂'+p.happy+' ⚡'+p.energy+' 💊'+p.health)}render()}document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',()=>{el.classList.add('press');setTimeout(()=>el.classList.remove('press'),130);act(el.dataset.action)}));document.addEventListener('keydown',e=>{const map={ArrowLeft:'prev',ArrowRight:'next',ArrowUp:'feed',ArrowDown:'rest',' ':'play',Enter:'play',h:'heal',H:'heal',e:'explore',E:'explore',m:'useMain',M:'useMain',s:'useSide',S:'useSide',i:'info',I:'info',Escape:'back'};if(map[e.key]){e.preventDefault();act(map[e.key)}});$('petImg').addEventListener('error',()=>{$('petImg').hidden=true;$('petFallback').hidden=false});$('petImg').addEventListener('load',()=>{$('petImg').hidden=false;$('petFallback').hidden=true});render();show('Toy ready ✨');
</script></body></html>
