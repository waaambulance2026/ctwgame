.body{position:relative;flex:1;min-height:0;padding:5px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:4}.hint{font-size:clamp(6px,.72vw,10px);font-weight:800;opacity:.7;text-align:center;line-height:1.1;margin-top:2px}.small{font-size:clamp(7px,.78vw,10px);font-weight:800;opacity:.8}.bigText{font-size:clamp(11px,1.45vw,20px);font-weight:1000;text-align:center;line-height:1.12}.row{display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap}
.choiceList{width:100%;height:100%;display:flex;flex-direction:column;gap:4px;justify-content:center}.choice{display:grid;grid-template-columns:auto 1fr;gap:5px;align-items:center;padding:5px 7px;border:1.5px solid rgba(22,34,63,.35);background:rgba(255,255,255,.24);border-radius:9px;font-weight:1000;font-size:clamp(9px,1.08vw,14px);line-height:1.05}.choice.active{background:rgba(255,255,255,.67);outline:2px solid rgba(22,34,63,.42)}.choice small{display:block;font-size:.72em;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.passwordCard{width:94%;max-width:260px;background:rgba(255,255,255,.35);border:1.5px solid rgba(22,34,63,.35);border-radius:12px;padding:7px;text-align:center;font-weight:1000}.passwordCard input{width:94%;margin:5px auto;display:block;border:1.5px solid rgba(22,34,63,.5);border-radius:9px;padding:6px 5px;text-align:center;font-weight:1000;background:rgba(255,255,255,.88);color:#111;font-size:16px;user-select:text}.screenBtn{border:1.5px solid rgba(22,34,63,.35);border-radius:999px;background:rgba(255,255,255,.88);font-weight:1000;padding:5px 12px;color:var(--ink)}.error{color:#9b1a56;font-size:clamp(7px,.8vw,11px);min-height:1.15em;font-weight:900}.loader{width:34px;height:34px;border-radius:50%;border:4px solid rgba(22,34,63,.16);border-top-color:rgba(22,34,63,.8);animation:spin .8s linear infinite;margin:3px auto}@keyframes spin{to{transform:rotate(360deg)}}
.petStage{position:absolute;inset:15% 4% 38% 4%;overflow:hidden}.petImg{position:absolute;left:50%;top:50%;width:76%;height:76%;transform:translate(-50%,-50%);background:center/contain no-repeat;filter:drop-shadow(0 7px 6px rgba(35,37,62,.20))}.petEmoji{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);font-size:clamp(30px,6vw,70px)}.petName{position:absolute;left:4px;right:4px;bottom:29%;text-align:center;font-size:clamp(10px,1.25vw,16px);font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.stats{position:absolute;left:7px;right:7px;bottom:5px;display:grid;gap:2px}.stat{display:grid;grid-template-columns:16px 1fr 24px;gap:3px;align-items:center;font-size:clamp(6px,.72vw,9px);font-weight:900}.bar{height:6px;border-radius:999px;background:rgba(255,255,255,.35);box-shadow:inset 0 0 0 1px rgba(22,34,63,.25);overflow:hidden}.bar i{display:block;height:100%;width:50%;border-radius:999px;background:rgba(22,34,63,.55)}.bar.h i{background:#ff7899}.bar.j i{background:#ffbd59}.bar.e i{background:#6ddf9e}.bar.hp i{background:#75c7ff}.details{position:absolute;left:4px;right:4px;bottom:24%;font-size:clamp(7px,.82vw,11px);font-weight:900;text-align:center;opacity:.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.msg{font-size:clamp(8px,.82vw,12px);font-weight:900;text-align:center;opacity:.8;margin-top:2px}.menuGrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:100%}.menuItem{border:1.5px solid rgba(22,34,63,.28);border-radius:9px;background:rgba(255,255,255,.24);padding:5px 4px;text-align:center;font-weight:1000;font-size:clamp(8px,.9vw,12px);min-height:36px;display:flex;flex-direction:column;justify-content:center}.menuItem.active{background:rgba(255,255,255,.70);outline:2px solid rgba(22,34,63,.35)}.menuItem b{font-size:1.25em}.panelList{width:100%;height:100%;overflow:auto;padding-right:2px;font-size:clamp(7px,.85vw,11px);font-weight:900}.panelItem{border:1px solid rgba(22,34,63,.24);border-radius:8px;background:rgba(255,255,255,.28);padding:4px;margin:3px 0}.debug{position:fixed;left:8px;bottom:8px;right:8px;max-height:26vh;overflow:auto;background:rgba(255,255,255,.88);border:1px solid rgba(22,34,63,.25);border-radius:10px;padding:8px;font:12px/1.25 monospace;display:none;user-select:text}.hit{position:absolute;border:0;background:transparent;outline:none;z-index:30;cursor:pointer;color:transparent;-webkit-tap-highlight-color:transparent}.hit:focus-visible{outline:2px solid rgba(255,255,255,.9);outline-offset:2px;border-radius:999px}.hit.siren{left:31%;top:6.5%;width:38%;height:12%;border-radius:18px}.hit.exit{left:43%;top:15%;width:14%;height:10.5%;border-radius:50%}.hit.prev{left:13.6%;top:67.8%;width:16.2%;height:13.8%;border-radius:42%}.hit.select{left:38%;top:70.8%;width:24%;height:16.2%;border-radius:50%}.hit.next{left:70.2%;top:67.8%;width:16.2%;height:13.8%;border-radius:42%}
@media (max-width:520px){.device{width:min(99vw,calc(99vh * .6667))}.body{padding:3px 5px}.choice{padding:4px 6px}.stats{gap:1px}.stat{grid-template-columns:14px 1fr 21px}.bar{height:5px}.menuGrid{gap:3px}.menuItem{padding:4px 3px;min-height:30px}}

.petBody .details{position:static;width:100%;font-size:clamp(6px,.75vw,9px);line-height:1.05;text-align:center;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 0 1px}

.top span:nth-child(2){display:block;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:clamp(8px,1vw,12px);}

.body.petBody{padding:3px 10px 7px!important;gap:2px!important}
.petBody .petStage{min-height:78px!important;max-height:118px!important;flex:1 1 66%!important;margin-top:0!important}

.panelCard.active{background:rgba(255,255,255,.75);outline:2px solid rgba(22,34,63,.30)}

@media (max-width:520px){.petBody .petStage{min-height:68px!important}.petBody .stat{grid-template-columns:14px 1fr 21px!important;padding:3px!important;font-size:clamp(7px,.9vw,11px)!important}.petBody .bar{height:7px!important}.menuGrid.main4 .menuItem{min-height:42px}}


/* Stage 6: remove placeholder mini-game. Games now launch the real Waaambulance platform game. */
.lcd{left:21.2%!important;top:39.4%!important;width:57.6%!important;height:27.1%!important;border-radius:7%/11%!important}
.top{height:13%!important;min-height:14px!important;padding:1px 14px!important}

.petBody .petEmoji{font-size:clamp(54px,8vw,95px)!important}
.petBody .details{font-size:clamp(7px,.84vw,10px)!important;margin-top:0!important;margin-bottom:2px!important}
.petBody .stats{grid-template-columns:1fr 1fr!important;gap:5px!important;margin-top:auto!important}
.petBody .stat{grid-template-columns:20px 1fr 30px!important;padding:5px 6px!important;border-radius:10px!important;background:rgba(255,255,255,.62)!important;font-size:clamp(9px,1.02vw,13px)!important;box-shadow:inset 0 0 0 1px rgba(22,34,63,.28),0 1px 4px rgba(22,34,63,.12)!important}
.petBody .bar{height:10px!important;background:rgba(255,255,255,.84)!important}
.panelGrid.shopGrid,.panelGrid.invGrid{grid-template-columns:1fr!important;gap:4px!important}
.panelCard.shopCard,.panelCard.invCard{min-height:32px!important;text-align:left!important;display:grid!important;grid-template-columns:auto 1fr auto!important;gap:5px!important;align-items:center!important;padding:5px 6px!important}
.panelCard .priceTag{font-weight:1000;white-space:nowrap}
.questGame{width:100%;height:100%;display:flex;flex-direction:column;gap:3px;align-items:stretch;justify-content:space-between}
.questStage{position:relative;flex:1;min-height:82px;border:1.5px solid rgba(22,34,63,.25);border-radius:10px;overflow:hidden;background:linear-gradient(#bcecff 0 55%,#75c77e 56% 74%,#8a5a3b 75% 100%)}
.questPet{position:absolute;bottom:22%;left:42%;width:44px;height:44px;background:center/contain no-repeat;filter:drop-shadow(0 4px 3px rgba(0,0,0,.25));transition:left .16s linear,bottom .16s ease;display:flex;align-items:center;justify-content:center;font-size:34px}

.questHud{font-size:clamp(8px,.9vw,12px);font-weight:1000;text-align:center;display:flex;justify-content:space-between;gap:4px}

/* Stage 6 readability polish */
.petPic{transform:scale(1.18);}
.statGrid{gap:5px!important;}
.statCard{min-height:22px!important;padding:3px 5px!important;font-size:10px!important;background:rgba(255,255,255,.72)!important;border:1px solid rgba(22,34,63,.18)!important;}
.statCard b{font-size:10px!important;}
.statFill{height:7px!important;border-radius:999px!important;}
.panelHead{font-size:11px!important;}


/* Stage 7: no scrollbar panels, real-game window, habitat and Hook-a-Waaambulance menu. */
.panelGrid,.panelList{overflow:hidden!important;padding-right:0!important}
.menuGrid.main6{grid-template-columns:1fr 1fr!important;gap:3px!important}

.panelGrid.shopGrid,.panelGrid.invGrid,.panelGrid.habitatGrid,.panelGrid.hookGrid{grid-template-columns:1fr 1fr!important;grid-template-rows:1fr 1fr!important;gap:5px!important;overflow:hidden!important}
.panelCard.shopCard,.panelCard.invCard,.panelCard.habitatCard,.panelCard.hookCard{min-height:42px!important;text-align:left!important;display:grid!important;grid-template-columns:auto 1fr!important;gap:5px!important;align-items:center!important;padding:5px 6px!important;overflow:hidden!important}
.panelCard .priceTag{grid-column:2;font-size:.9em;opacity:.9}

/* STAGE 8: correct pet size, habitat preview, Hook-a-Waa game, and clear LCD game window. */
html.questPlaying,body.questPlaying{background:transparent!important;}
body.questPlaying{background:transparent!important;}
body.questPlaying #app{background:transparent!important;}
body.questPlaying .lcd{background:transparent!important;box-shadow:inset 0 0 0 2px rgba(21,34,63,.35)!important;}
body.questPlaying .lcd:before{opacity:.22!important;z-index:20!important;}
body.questPlaying .top,body.questPlaying .body{display:none!important;}
.questGameGlass{position:absolute;inset:0;pointer-events:none;background:transparent!important;}
.petBody .petStage{min-height:72px!important;max-height:96px!important;flex:1 1 58%!important;overflow:hidden!important;}
.petBody .petImg{max-width:96%!important;max-height:96%!important;filter:drop-shadow(0 5px 5px rgba(35,37,62,.18))!important;}
.petBody .details{font-size:clamp(7px,.82vw,10px)!important;margin-top:0!important;}
.petBody .stats{gap:4px!important;margin-top:2px!important;}
.petBody .stat{grid-template-columns:18px 1fr 28px!important;padding:4px 5px!important;font-size:clamp(8px,.95vw,12px)!important;}
.petBody .bar{height:8px!important;}
.habitatView,.hookGameView{width:100%;height:100%;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;overflow:hidden;}
.habitatFrame{position:relative;width:100%;flex:1 1 auto;min-height:92px;border:1.5px solid rgba(22,34,63,.25);border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,.30),rgba(118,199,216,.16));overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);}
.habitatFrame.withImage{background-size:cover!important;background-position:center!important;background-repeat:no-repeat!important;}

.habitatTitle,.hookTitle{font-weight:1000;text-align:center;font-size:clamp(8px,1vw,12px);line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.habitatSub,.hookSub{font-weight:900;text-align:center;font-size:clamp(6px,.78vw,9px);opacity:.78;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.hookPond{position:relative;width:100%;flex:1 1 auto;min-height:96px;border:1.5px solid rgba(22,34,63,.25);border-radius:12px;overflow:hidden;background:linear-gradient(#b9f5ff 0 48%,#6dd6f1 49% 66%,#23a6d5 67% 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.45);}
.hookLine{position:absolute;left:50%;top:0;width:2px;height:45%;background:#17223f;transform-origin:top center;animation:hookSwing 1.8s ease-in-out infinite;}
.hookLine:after{content:'🪝';position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);font-size:20px;}
.hookPrize{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);font-size:28px;animation:floatPrize 1.4s ease-in-out infinite;}
.hookWave{position:absolute;left:-8%;right:-8%;bottom:30%;height:14px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.75) 0 18px,transparent 18px 36px);opacity:.55;border-radius:999px;animation:waveSlide 2.2s linear infinite;}
.hookResult{position:absolute;left:4px;right:4px;bottom:4px;text-align:center;font-weight:1000;font-size:clamp(7px,.85vw,10px);background:rgba(255,255,255,.62);border-radius:8px;padding:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@keyframes hookSwing{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
@keyframes floatPrize{0%,100%{bottom:14%}50%{bottom:19%}}
@keyframes waveSlide{to{transform:translateX(36px)}}
.hookCasting .hookLine{animation:hookCast .55s ease-in-out 1;}

function makeHabitatLayer(cls,url,x=50,y=50,w=30,h=30,z=20){

  if(cls==='background')return {cls:'background',url,x:0,y:0,w:100,h:100,z:1};
  return {cls:cls||'decor',url,x,y,w,h,z};

function buildHabitatKeyMap(rows){
  // Exact-key map only. Do not match by loose names, because that was causing random dragon/decor art.
  const map=new Map();
  for(const r of rows||[]){
    if(!r||rowLooksLikeCareItem(r))continue;
    const url=itemImage(r);
    if(!url)continue;
    const keys=[
      pick(r,['habitat_key','item_id','item_key','key','id','background_key','base_key','decor_key','special_key','loadout_key','asset_key'],''),
      pick(r,['cloudinary_public_id','public_id'],'')
    ].map(clean).filter(Boolean);
    for(const k of keys)map.set(norm(k),r);
  }
  return map;

function resolveHabitatImage(value,keyMap){
  const direct=imageUrlFromValue(value);
  if(direct)return direct;
  const key=norm(clean(value));
  if(key&&keyMap.has(key))return itemImage(keyMap.get(key));
  return '';
}

}
function fieldAny(row, patterns){
  if(!row||typeof row!=='object')return'';
  const keys=Object.keys(row);
  for(const pat of patterns){
    const re=pat instanceof RegExp?pat:new RegExp(pat,'i');
    const k=keys.find(x=>re.test(x));
    if(k&&clean(row[k])!=='')return row[k];
  }
  return'';
}

  const compositeUrl=cleanImageUrl(pick(layout,compositeFields,''));
  if(compositeUrl){
    layers.push(makeHabitatLayer('background',compositeUrl,0,0,100,100,1));
    return layers.filter(Boolean);
  }

  function layerFromValue(cls,value,x,y,w,h,z){
    const url=resolveHabitatImage(value,keyMap);
    if(!url)return false;
    layers.push(makeHabitatLayer(cls,url,x,y,w,h,z));
    return true;
  }

  const bgVal=firstFieldValue(layout,[
    ['background_image_url','habitat_background_url','room_image_url','background_url','bg_url','image_url'],
    ['background_key','bg_key','background','habitat_background','room_background','room_key']
  ]);
  layerFromValue('background',bgVal,0,0,100,100,1);

  const baseVal=firstFieldValue(layout,[
    ['base_image_url','floor_image_url','ground_image_url','base_url'],
    ['base_key','floor_key','ground_key','base','floor','ground']
  ]);

  const decorSets=[

    [['special_image_url','special_url'],['special_key','special','special_item_key']]

async function loadUserPets(userId){

function mergePetLists(primary,secondary){

  for(const p of primary||[]){const k=keyFor(p);if(k&&!byKey.has(k)){byKey.set(k,{...p});out.push(byKey.get(k));}}
  for(const p of secondary||[]){const k=keyFor(p);if(k&&byKey.has(k)){Object.assign(byKey.get(k),{...p,name:byKey.get(k).name||p.name});}else if(k){const v={...p};byKey.set(k,v);out.push(v);}}

async function fetchJson(url,timeoutMs){

const SHEET_CACHE=new Map();
async function fetchSheetRows(tab){
  const cacheKey=tab;
  const cached=SHEET_CACHE.get(cacheKey);
  if(cached&&Date.now()-cached.t<45000)return cached.rows;
  const url=`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?`+new URLSearchParams({tqx:'out:json',sheet:tab,tq:'select *'}).toString();
  const text=await (await fetch(url,{cache:'no-store'})).text();
  const rows=parseGviz(text);
  SHEET_CACHE.set(cacheKey,{t:Date.now(),rows});
  return rows;
}
function parseGviz(text){
  const start=text.indexOf('{'),end=text.lastIndexOf('}'); if(start<0||end<start)throw new Error('Sheet not readable');
  const data=JSON.parse(text.slice(start,end+1)); const table=data.table||{};
  let headers=(table.cols||[]).map((c,i)=>clean(c.label||c.id||('col'+i))||('col'+i));
  let rows=(table.rows||[]).map(r=>{const o={};(r.c||[]).forEach((cell,i)=>o[headers[i]||('col'+i)]=cell?clean(cell.f??cell.v??''):'');return o;});
  if(rows.length){
    const first=headers.map(h=>clean(rows[0][h])); const low=first.map(x=>x.toLowerCase());
    if(low.includes('user_id')||low.includes('pet_code')||low.includes('image_url')||low.includes('section')){
      const old=headers; headers=first.map((v,i)=>v||('col'+i));
      rows=rows.slice(1).map(r=>{const o={};old.forEach((h,i)=>o[headers[i]||('col'+i)]=r[h]);return o;});
    }
  }
  return rows.filter(r=>Object.values(r).some(v=>clean(v)!==''));
}

function weightedPrize(pool){
  const arr=(pool||[]).filter(Boolean);
  if(!arr.length)return null;
  const total=arr.reduce((sum,it)=>sum+Math.max(0,Number(pick(it.raw||it,['roll_weight','weight'],'')||0)),0);
  if(total<=0)return arr[Math.floor(Math.random()*arr.length)];
  let roll=Math.random()*total;
  for(const it of arr){
    roll-=Math.max(0,Number(pick(it.raw||it,['roll_weight','weight'],'')||0));
    if(roll<=0)return it;
  }
  return arr[arr.length-1];
}

    layoutRows=dedupeRows(layoutRows).filter(r=>r&&!rowLooksLikeCareItem(r));
    const userRows=layoutRows.filter(r=>strictUserMatch(r,userId));

async function loadRowsFromProxyAndSheets(modes,tabs,userId,p){

      const data=await fetchJson('/api/petbot?'+q.toString(),12000);
      if(data&&typeof data==='object'&&!Array.isArray(data)&&data.found!==false){
        const rootImage=itemImage(data);
        const hasUsefulRoot=rootImage||pick(data,['pet_name','pet_code','habitat_title','background_habitat_key','base_habitat_key','decor_1_item_key','prize_1_name','hook_name','quest_name'],'');
        if(hasUsefulRoot) all.push(data);
      }
      all.push(...findArray(data,['inventory','shop','items','rows','data','results','prizes','catalogue','catalog']));
      for(let i=1;i<=25;i++){
        const name=data&&pick(data,[`prize_${i}_name`,`hook_${i}_name`,`item_${i}_name`,`menu_item_${i}_name`],'');
        const img=data&&pick(data,[`prize_${i}_image`,`hook_${i}_image`,`item_${i}_image`,`menu_item_${i}_image`],'');
        const key=data&&pick(data,[`prize_${i}_key`,`hook_${i}_key`,`item_${i}_key`,`menu_item_${i}_value`],'');
        if(name||img||key) all.push({item_name:name||key||`Prize ${i}`,item_id:key,hook_key:key,image_url:img,quantity:pick(data,[`prize_${i}_quantity`,`prize_${i}_owned_count`],''),category:pick(data,[`prize_${i}_type`,`prize_${i}_rarity`,`hook_${i}_rarity`],'')});
      }
    }catch(e){log('panel proxy '+mode+' failed',e.message||e);}
  }
  for(const tab of tabs){
    try{all.push(...await fetchSheetRows(tab));}catch(e){log('panel sheet '+tab+' failed',e.message||e);}
  }
  return dedupeRows(all);
}

    const pet=currentPet()||{};
    let layers=[];
    const cached=readRealCachedHabitatLayers();

    // While the sheet/API is still loading, show a real cached room if one exists.
    // Do not build/cache the stripe default from an empty item list.
    if(state.panelLoading && !items.length){
      layers=cached;
      const msg=layers.length?'Refreshing habitat...':'Loading habitat...';
      return `<div class="habitatFullScreen"><div class="habitatView"><div class="habitatFrame stage15Full stage10Full stage11Simple withImage">${layers.map(habitatLayerHtml).join('')}${loadingCard(msg)}</div></div></div>`;
    }

    layers=buildHabitatLayers(items,pet);

    // If buildHabitatLayers only produced the stripe default, prefer the last real habitat cache.
    if(habitatIsOnlyDefault(layers) && cached.length){
      layers=cached;
    }else if(habitatHasRealArt(layers)){
      writeRealCachedHabitatLayers(layers);
    }

    const onlyDefault=habitatIsOnlyDefault(layers);
    const msg=state.panelLoading?'Loading habitat...':(state.panelMessage||'No habitat loadout image found yet.');
    const label = (!layers.length || onlyDefault) ? loadingCard(msg) : '';

    // No emoji pet fallback here. Real pet art is shown only if PetBot/Sheet provides an image URL.
    return `<div class="habitatFullScreen"><div class="habitatView"><div class="habitatFrame stage15Full stage10Full stage11Simple withImage">${layers.map(habitatLayerHtml).join('')}${label}</div></div></div>`;
  };

  const oldOpenDataPanel38=openDataPanel;
  openDataPanel=function(kind){
    if(kind==='habitat'){
      // Clear bad same-session default-cache before opening habitat.
      try{
        const hit=PANEL_CACHE.get(panelCacheKey('habitat'));
        if(hit && Array.isArray(hit.items) && hit.items.length===1){
          const raw=(hit.items[0]&&hit.items[0].raw)||{};
          if(raw.__habitatRender && !(raw.layoutRows||[]).length && !(raw.catalogRows||[]).length) PANEL_CACHE.delete(panelCacheKey('habitat'));
        }
      }catch(e){}
    }
    return oldOpenDataPanel38(kind);
  };
})();

// STAGE 42: normal Tamagotchi mode must never stay on the transparent quest LCD.
// The quest LCD is only for embedded platform play; when the parent asks for PetBot
// home, render a real user/pet screen so the device is not blank.
(function(){
  function showRealPetbotHome(){
    try{
      document.documentElement.classList.remove('cssFullscreen','questPlaying');
      document.body.classList.remove('cssFullscreen','questPlaying');
      state.returnToQuest=false;
      state.returnQuestMode='';
      state.quest={mode:'Solo Quest',x:42,jump:false,score:0,started:false,embedded:false};
      if(state.player && currentPet()){
        state.screen='petHome';
      }else if(state.player && state.pets && state.pets.length){
        state.petIndex=Math.max(0,Math.min(state.petIndex||0,state.pets.length-1));
        state.screen='petHome';
      }else{
        state.screen='login';
        state.player=null;
        state.pets=[];
        state.petIndex=0;
        state.password='';
        state.error='';
        state.message='Choose player';
      }
      render();
    }catch(e){ console.warn('Stage 42 PetBot home restore failed',e); }
  }
  window.addEventListener('message',function(e){
    if(e.origin!==location.origin)return;
    const d=e.data||{};
    if(d.type==='waa-parent-show-petbot-home'){
      showRealPetbotHome();
      try{e.stopImmediatePropagation();}catch(_e){}
    }
  },true);
})();

render();
})();
</script>
