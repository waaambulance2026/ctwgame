<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Waaambulance PetBot Test</title>
<style>
:root{
  --pink:#f05fb2;
  --pink2:#ff9bd4;
  --blue:#28b9e8;
  --blue2:#8ce9ff;
  --red:#ef3f43;
  --red2:#ff666b;
  --cream:#fffaf3;
  --ink:#24152e;
  --navy:#111a2f;
  --yellow:#ffe66f;
  --green:#47d990;
  --shadow:rgba(24,14,35,.35);
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at 50% 0%,#e9fbff 0 25%,#ffd8ee 55%,#f6b6db 100%);color:var(--ink)}
button,select{font:inherit}
button{cursor:pointer;border:0}
.petbotApp{width:100vw;height:100dvh;min-height:100vh;display:grid;place-items:center;overflow:hidden;padding:10px;background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.8),rgba(118,199,216,.22) 38%,rgba(210,130,194,.35) 100%)}
.device{position:relative;width:100%;height:100%;max-width:1900px;max-height:1060px;border:5px solid rgba(255,255,255,.85);border-radius:34px;background:linear-gradient(145deg,#fffcf6 0 11%,#fff9f2 11% 89%,#fff9f4 89% 100%);box-shadow:0 0 0 8px var(--red),0 0 28px rgba(210,130,194,.95),0 0 56px rgba(118,199,216,.82),inset 0 0 42px rgba(255,255,255,.9);overflow:hidden;display:grid;grid-template-columns:minmax(92px,11vw) 1fr minmax(92px,11vw);grid-template-rows:minmax(108px,15vh) 1fr minmax(44px,6vh)}
.device:before,.device:after{content:"";position:absolute;top:0;bottom:0;width:13vw;min-width:125px;max-width:230px;background:linear-gradient(90deg,#ee2f36,#ff646a 42%,#ff8a8d 55%,#ee3339);box-shadow:inset 26px 0 28px rgba(255,255,255,.34),inset -22px 0 32px rgba(111,0,0,.22);z-index:0}.device:before{left:0}.device:after{right:0;transform:scaleX(-1)}
.topBar{grid-column:1/4;position:relative;z-index:2;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:12px min(34px,2vw) 4px;min-height:0}.testBadge{justify-self:start;background:linear-gradient(#fffad6,#ffd83b);padding:11px 18px;border-radius:999px;font-weight:1000;box-shadow:0 6px 0 #c59600,0 14px 18px rgba(0,0,0,.18);font-size:clamp(12px,1.1vw,18px)}.brand{justify-self:center;text-align:center;filter:drop-shadow(0 8px 16px rgba(0,0,0,.18))}.siren{width:clamp(190px,20vw,330px);height:48px;margin:auto;border:7px solid #223044;border-radius:12px;background:#111;display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:6px;padding:6px;box-shadow:inset 0 0 11px #000,0 0 18px rgba(40,185,232,.8)}.lamp{border-radius:8px;box-shadow:inset 0 7px 8px rgba(255,255,255,.45),inset 0 -6px 9px rgba(0,0,0,.22)}.lamp.blue{background:linear-gradient(#54c6ff,#047bd3)}.lamp.red{background:linear-gradient(#ff6367,#e21f2a)}.lamp.white{background:linear-gradient(#fff,#dce5ee)}.brandTitle{line-height:.9;font-weight:1000;letter-spacing:-1px}.brandTitle .waa{display:block;font-size:clamp(32px,3.4vw,62px);color:#20b9e9;text-shadow:3px 3px 0 white,6px 6px 0 rgba(239,63,67,.72)}.brandTitle .pet{display:block;font-size:clamp(38px,4.1vw,74px);color:#ef3f43;text-shadow:3px 3px 0 white,6px 6px 0 rgba(40,185,232,.72)}.backBtn{justify-self:end;background:linear-gradient(#3b1647,#1f0f2a);color:#fff;padding:13px 22px;border-radius:999px;font-weight:1000;box-shadow:0 7px 0 #0b0610,0 12px 18px rgba(0,0,0,.22)}.backBtn:active{transform:translateY(5px);box-shadow:0 2px 0 #0b0610}
.sideRail{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;padding:18px 8px;min-width:0}.sideButton{width:clamp(70px,7vw,122px);height:clamp(70px,7vw,122px);border-radius:24px;background:linear-gradient(145deg,#fff,#fff5fb);border:5px solid var(--pink);box-shadow:0 11px 0 #cf3182,0 0 22px rgba(240,95,178,.65),inset 0 10px 15px rgba(255,255,255,.9),inset 0 -12px 18px rgba(210,130,194,.18);display:grid;place-items:center;font-size:clamp(25px,3vw,46px);font-weight:1000;color:#3b2149;transition:.08s}.sideButton.blue{border-color:var(--blue);box-shadow:0 11px 0 #0889bd,0 0 22px rgba(40,185,232,.72),inset 0 10px 15px rgba(255,255,255,.9),inset 0 -12px 18px rgba(118,199,216,.22)}.sideButton.red{background:linear-gradient(145deg,#ff8890,#ef3541);border-color:#d31730;box-shadow:0 14px 0 #a70e22,0 0 22px rgba(239,63,67,.72),inset 0 12px 14px rgba(255,255,255,.34);color:white}.sideButton:active,.action:active,.roundNav:active{transform:translateY(7px);box-shadow:0 3px 0 rgba(0,0,0,.35)}.speaker{width:70%;max-width:110px;height:52px;display:grid;gap:7px}.speaker span{display:block;height:7px;border-radius:999px;background:#39212d;box-shadow:inset 0 2px 2px rgba(255,255,255,.24)}.dpad{width:clamp(92px,8vw,148px);height:clamp(92px,8vw,148px);position:relative;border-radius:26px;background:linear-gradient(145deg,#ff7d86,#e91f38);border:5px solid #c9152b;box-shadow:0 17px 0 #9d0d22,0 0 28px rgba(239,63,67,.65),inset 0 11px 16px rgba(255,255,255,.35)}.dpad button{position:absolute;background:rgba(255,255,255,.82);color:#e91f38;font-weight:1000;border-radius:16px;box-shadow:inset 0 -4px 0 rgba(0,0,0,.12)}.dpad .up{left:35%;top:8%;width:30%;height:28%}.dpad .down{left:35%;bottom:8%;width:30%;height:28%}.dpad .left{left:8%;top:35%;width:28%;height:30%}.dpad .right{right:8%;top:35%;width:28%;height:30%}.dpad .centre{left:36%;top:36%;width:28%;height:28%;border-radius:50%;background:#fff}
.screenWrap{grid-column:2;grid-row:2;position:relative;z-index:3;display:grid;min-width:0;min-height:0;align-items:stretch;padding:0 12px 18px}.screen{position:relative;min-height:0;height:100%;border-radius:34px;background:#13213b;border:12px solid #151629;box-shadow:0 18px 0 #090913,0 0 30px rgba(240,95,178,.9),0 0 60px rgba(40,185,232,.75),inset 0 0 0 5px #3a4b67;overflow:hidden;display:grid;grid-template-rows:auto 1fr auto}.screen:before{content:"";position:absolute;inset:13px;border-radius:22px;pointer-events:none;box-shadow:inset 0 0 0 4px rgba(118,199,216,.85),inset 0 0 34px rgba(255,255,255,.3);z-index:3}.screenTop{position:relative;z-index:4;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:13px 18px;background:linear-gradient(#d9f7ff,#aceeff);border-bottom:4px solid #55c7e7}.selector{display:flex;gap:8px;align-items:center}.roundNav{width:43px;height:43px;border-radius:50%;background:linear-gradient(#fffca8,#ffd749);font-weight:1000;box-shadow:0 5px 0 #bc9300;color:#3a2846}.petSelect{height:43px;min-width:190px;border:0;border-radius:999px;padding:0 18px;background:#fff;font-weight:1000;color:#24152e;box-shadow:inset 0 -3px 0 rgba(40,185,232,.2)}.petNameTop{text-align:center;font-size:clamp(17px,1.8vw,29px);font-weight:1000;color:#005ca6}.loveScore{justify-self:end;background:linear-gradient(#0e98e9,#005aa8);color:white;padding:8px 16px;border-radius:999px;font-size:clamp(17px,1.6vw,27px);font-weight:1000;box-shadow:0 0 16px rgba(40,185,232,.68)}
.screenMain{position:relative;z-index:2;min-height:0;background:linear-gradient(180deg,#eafcff 0,#fff3fb 100%);display:grid;grid-template-columns:minmax(205px,18%) 1fr;gap:18px;padding:18px}.statsPanel{border-radius:24px;background:linear-gradient(180deg,#287cca,#075a9f);border:4px solid white;box-shadow:0 8px 16px rgba(0,0,0,.25),inset 0 0 22px rgba(255,255,255,.14);padding:14px;color:white;min-height:0}.levelBadge{background:linear-gradient(90deg,#ff69ba,#f249a8);border:4px solid white;border-radius:18px;text-align:center;font-size:clamp(18px,1.6vw,30px);font-weight:1000;padding:10px;margin-bottom:14px;box-shadow:0 5px 0 rgba(0,0,0,.18)}.stat{display:grid;grid-template-columns:38px 1fr;gap:9px;align-items:center;margin:12px 0}.statIcon{width:38px;height:38px;border-radius:12px;background:#fff;display:grid;place-items:center;font-size:22px;box-shadow:0 3px 0 rgba(0,0,0,.25)}.stat b{display:block;font-size:clamp(13px,1.05vw,18px)}.meter{height:17px;border-radius:999px;border:3px solid rgba(255,255,255,.65);background:rgba(255,255,255,.24);overflow:hidden}.meter span{display:block;height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,#ff62ba,#ffe16b)}.meter.green span{background:linear-gradient(90deg,#24d77c,#9cffd7)}.meter.blue span{background:linear-gradient(90deg,#2bc3ff,#a7efff)}.habitatStage{position:relative;min-width:0;min-height:0;border-radius:28px;border:5px solid rgba(255,255,255,.85);background:radial-gradient(circle at 24% 70%,rgba(255,255,255,.76) 0 13%,transparent 14%),linear-gradient(180deg,#dff8ff 0,#fdfcff 58%,#ffd8ef 59% 100%);box-shadow:inset 0 -26px 0 rgba(210,130,194,.18),inset 0 0 46px rgba(255,255,255,.85),0 10px 19px rgba(0,0,0,.12);overflow:hidden;display:grid;place-items:center}.habitatStage:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.58),transparent 35%);pointer-events:none}.petImg{position:relative;z-index:2;max-width:min(48vh,42%);max-height:78%;object-fit:contain;filter:drop-shadow(0 18px 18px rgba(0,0,0,.28));transition:.2s}.petImg.bounce{animation:bounce .45s ease}@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(-18px) scale(1.04)}70%{transform:translateY(4px) scale(.98)}}.effectBubble{position:absolute;z-index:4;right:8%;top:13%;min-width:140px;padding:13px 18px;border-radius:999px;background:linear-gradient(#fff,#ffe9f8);border:4px solid var(--pink);box-shadow:0 0 24px rgba(240,95,178,.7),0 10px 14px rgba(0,0,0,.18);font-weight:1000;text-align:center;opacity:0;transform:translateY(15px) scale(.92);pointer-events:none}.effectBubble.show{animation:pop .95s ease}@keyframes pop{0%{opacity:0;transform:translateY(16px) scale(.8)}20%,75%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-14px) scale(.95)}}
.actions{position:relative;z-index:4;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:13px 18px 17px;background:linear-gradient(#d8f8ff,#bdeeff);border-top:4px solid #43bfdf}.action{min-height:68px;border-radius:18px;background:linear-gradient(180deg,#fff8ff,#ffeaf8);border-bottom:7px solid #d43b93;box-shadow:0 8px 10px rgba(0,0,0,.14),inset 0 10px 16px rgba(255,255,255,.85);font-size:clamp(13px,1vw,17px);font-weight:1000;color:#24152e;display:grid;place-items:center;gap:1px}.action b{font-size:clamp(19px,1.8vw,31px)}.action.yellow{background:linear-gradient(#fff5a7,#ffe16b);border-bottom-color:#c79700}.action.blue{background:linear-gradient(#f2ffff,#d8faff);border-bottom-color:#0893cf}.action.pink{background:linear-gradient(#fff5fb,#ffd5ef);border-bottom-color:#d43b93}.footer{grid-column:1/4;position:relative;z-index:4;display:flex;align-items:center;justify-content:center;min-height:0;padding:0 16px 10px}.pacifier{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);width:clamp(190px,19vw,350px);height:92px;border-radius:70px 70px 30px 30px;background:linear-gradient(#ff9bd4,#ef5fb2);border:6px solid white;box-shadow:0 0 28px rgba(240,95,178,.85),0 14px 0 #b12874}.pacifier:before{content:"";position:absolute;left:50%;top:19px;transform:translateX(-50%);width:32%;height:38px;border-radius:20px;background:linear-gradient(#ffbedf,#f26bb8);box-shadow:inset 0 8px 12px rgba(255,255,255,.45)}.pacifier:after{content:"";position:absolute;left:18%;right:18%;bottom:18px;height:20px;border:7px solid #4a203b;border-top:0;border-radius:0 0 50px 50px}.status{position:absolute;left:24px;right:24px;bottom:13px;z-index:1;padding:8px 18px;border-radius:999px;background:rgba(255,255,255,.78);border:3px dashed rgba(40,185,232,.45);font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.status strong{color:#005ca6}.realNote{position:absolute;right:18px;bottom:15px;color:#fff;background:rgba(36,21,46,.82);padding:7px 12px;border-radius:999px;font-size:12px;font-weight:1000;z-index:5}
@media(max-width:1100px){.device{grid-template-columns:72px 1fr 72px;border-radius:22px}.device:before,.device:after{min-width:82px;width:9vw}.sideButton{width:58px;height:58px;border-radius:18px;border-width:4px;font-size:24px}.speaker{height:40px}.dpad{width:66px;height:66px;border-radius:17px}.topBar{min-height:86px;padding:8px 12px 0}.testBadge{padding:8px 11px}.backBtn{padding:10px 12px}.siren{height:36px}.brandTitle .waa{font-size:29px}.brandTitle .pet{font-size:36px}.screenWrap{padding:0 6px 12px}.screen{border-width:8px;border-radius:24px}.screenMain{grid-template-columns:175px 1fr;padding:12px;gap:12px}.actions{gap:7px;padding:9px 12px 13px}.action{min-height:58px}.petImg{max-width:50%;max-height:72%}.status{font-size:11px;left:12px;right:12px}}
@media(max-width:720px){.petbotApp{padding:0}.device{border-radius:0;border:0;box-shadow:none;grid-template-columns:1fr;grid-template-rows:76px 1fr 32px}.device:before,.device:after,.sideRail,.pacifier,.realNote{display:none}.topBar{grid-column:1;grid-template-columns:auto 1fr auto;gap:8px;padding:6px}.brandTitle .waa{font-size:22px}.brandTitle .pet{font-size:25px}.siren{width:110px;height:27px;border-width:4px;gap:3px;padding:3px}.testBadge{font-size:10px;padding:6px 8px}.backBtn{font-size:12px;padding:8px 10px}.screenWrap{grid-column:1;grid-row:2;padding:6px}.screen{border-width:6px;border-radius:18px}.screenTop{padding:8px;grid-template-columns:1fr auto}.selector{grid-column:1}.petNameTop{display:none}.loveScore{grid-column:2}.petSelect{min-width:120px;width:46vw}.roundNav{width:34px;height:34px}.screenMain{grid-template-columns:1fr;grid-template-rows:auto 1fr;padding:8px;gap:8px}.statsPanel{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px}.levelBadge{grid-column:1/-1;padding:5px;margin:0;font-size:14px}.stat{grid-template-columns:1fr;margin:0;gap:4px}.statIcon{width:30px;height:30px;margin:auto;font-size:17px}.stat b{text-align:center;font-size:10px}.meter{height:10px}.habitatStage{min-height:0}.petImg{max-width:48%;max-height:82%}.actions{grid-template-columns:repeat(4,1fr);gap:5px;padding:6px}.action{min-height:48px;border-radius:12px;border-bottom-width:4px;font-size:10px}.action b{font-size:18px}.status{bottom:5px;font-size:10px;padding:5px 8px}}
@media(max-height:670px) and (min-width:721px){.topBar{min-height:86px}.brandTitle .waa{font-size:30px}.brandTitle .pet{font-size:38px}.siren{height:35px}.screenMain{padding:10px;gap:10px}.actions{padding:8px 12px 10px}.action{min-height:50px}.petImg{max-height:70%}.sideButton{height:68px;width:68px}.dpad{height:80px;width:80px}.speaker{height:38px}.pacifier{height:70px}}
</style>
</head>
<body>
<div class="petbotApp">
  <main class="device" aria-label="Waaambulance PetBot test device">
    <header class="topBar">
      <span class="testBadge">TEST PAGE</span>
      <div class="brand" aria-hidden="true"><div class="siren"><span class="lamp blue"></span><span class="lamp white"></span><span class="lamp red"></span><span class="lamp white"></span><span class="lamp blue"></span></div><div class="brandTitle"><span class="waa">Waaambulance</span><span class="pet">PetBot</span></div></div>
      <button class="backBtn" onclick="location.href='index.html'">← Back to game</button>
    </header>

    <aside class="sideRail leftRail">
      <button class="sideButton" data-action="prev" title="Previous pet">🐾</button>
      <button class="sideButton blue" data-action="useMain" title="Use as main player">🚑</button>
      <div class="speaker"><span></span><span></span><span></span></div>
      <button class="sideButton" data-action="play" title="Play / love">♡</button>
    </aside>

    <section class="screenWrap">
      <div class="screen">
        <div class="screenTop">
          <div class="selector">
            <button class="roundNav" data-action="prev">←</button>
            <select id="petSelect" class="petSelect"></select>
            <button class="roundNav" data-action="next">→</button>
          </div>
          <div class="petNameTop" id="petNameTop">Bubbles · Axolotl</div>
          <div class="loveScore">💗 <span id="loveScore">128</span></div>
        </div>
        <div class="screenMain">
          <aside class="statsPanel">
            <div class="levelBadge" id="levelBadge">LV. 05</div>
            <div class="stat"><span class="statIcon">🍔</span><div><b>Hunger</b><div class="meter"><span id="hungerBar"></span></div></div></div>
            <div class="stat"><span class="statIcon">😊</span><div><b>Happy</b><div class="meter"><span id="happyBar"></span></div></div></div>
            <div class="stat"><span class="statIcon">⚡</span><div><b>Energy</b><div class="meter blue"><span id="energyBar"></span></div></div></div>
            <div class="stat"><span class="statIcon">💊</span><div><b>Health</b><div class="meter green"><span id="healthBar"></span></div></div></div>
          </aside>
          <div class="habitatStage" id="habitatStage">
            <img class="petImg" id="petImg" alt="selected pet">
            <div class="effectBubble" id="effectBubble">Ready!</div>
          </div>
        </div>
        <div class="actions">
          <button class="action yellow" data-action="feed"><b>🍔</b>Feed</button>
          <button class="action pink" data-action="play"><b>🧸</b>Play</button>
          <button class="action blue" data-action="rest"><b>🌙</b>Rest</button>
          <button class="action pink" data-action="heal"><b>💊</b>Heal</button>
          <button class="action blue" data-action="train"><b>🏋️</b>Train</button>
          <button class="action yellow" data-action="explore"><b>🧭</b>Explore</button>
          <button class="action pink" data-action="useMain"><b>⭐</b>Use Main</button>
          <button class="action blue" data-action="useSide"><b>🐾</b>Use Side</button>
        </div>
      </div>
    </section>

    <aside class="sideRail rightRail">
      <button class="sideButton" data-action="heal" title="Heal pet">💗</button>
      <div class="dpad" aria-label="Pet controls">
        <button class="up" data-action="feed">▲</button>
        <button class="down" data-action="rest">▼</button>
        <button class="left" data-action="prev">◀</button>
        <button class="right" data-action="next">▶</button>
        <button class="centre" data-action="play">♥</button>
      </div>
      <div class="speaker"><span></span><span></span><span></span></div>
      <button class="sideButton blue" data-action="rest" title="Rest / care">💧</button>
    </aside>

    <footer class="footer"><div class="pacifier" aria-hidden="true"></div><div class="status" id="status"><strong>Safe test build:</strong> all toy buttons are real controls. Later this connects to Sheet 51 and user_habitat_layout.</div><div class="realNote">All buttons work</div></footer>
  </main>
</div>
<script>
const pets=[
  {name:'Bubbles',type:'Axolotl',level:5,love:128,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781797059/ax_idle_001.png',hunger:68,happy:80,energy:48,health:90},
  {name:'Pura',type:'Mascot',level:7,love:211,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798378/pura_idle_001.png',hunger:78,happy:72,energy:65,health:86},
  {name:'Moonbeam',type:'Unicorn',level:4,love:95,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798484/unicorn_idle_001.png',hunger:52,happy:60,energy:82,health:75},
  {name:'Hoots',type:'Owl',level:3,love:84,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1782133620/owl_idle_001.png',hunger:58,happy:63,energy:74,health:80}
];
let idx=0;
const $=id=>document.getElementById(id);
function clamp(v){return Math.max(0,Math.min(100,v));}
function render(){
  const p=pets[idx];
  $('petSelect').value=String(idx);
  $('petNameTop').textContent=`${p.name} · ${p.type}`;
  $('loveScore').textContent=p.love;
  $('levelBadge').textContent=`LV. ${String(p.level).padStart(2,'0')}`;
  $('petImg').src=p.img;
  $('petImg').alt=`${p.name} the ${p.type}`;
  $('hungerBar').style.width=clamp(p.hunger)+'%';
  $('happyBar').style.width=clamp(p.happy)+'%';
  $('energyBar').style.width=clamp(p.energy)+'%';
  $('healthBar').style.width=clamp(p.health)+'%';
  $('status').innerHTML=`<strong>${p.name}</strong> is ready. Big toy buttons are real controls in this test build.`;
}
function bubble(text){
  const b=$('effectBubble');
  b.textContent=text;
  b.classList.remove('show');
  void b.offsetWidth;
  b.classList.add('show');
  const img=$('petImg');
  img.classList.remove('bounce');
  void img.offsetWidth;
  img.classList.add('bounce');
}
function changePet(delta){idx=(idx+delta+pets.length)%pets.length;render();bubble('Pet changed 🐾');}
function act(action){
  const p=pets[idx];
  const messages={
    feed:'Fed! 🍔',play:'Play time! 🧸',rest:'Resting... 🌙',heal:'Healed! 💊',train:'Training! 🏋️',explore:'Exploring! 🧭',useMain:'Set as main ⭐',useSide:'Set as sidekick 🐾'
  };
  if(action==='prev')return changePet(-1);
  if(action==='next')return changePet(1);
  if(action==='feed'){p.hunger=clamp(p.hunger+12);p.energy=clamp(p.energy-3)}
  if(action==='play'){p.happy=clamp(p.happy+12);p.energy=clamp(p.energy-6);p.love+=3}
  if(action==='rest'){p.energy=clamp(p.energy+16);p.hunger=clamp(p.hunger-4)}
  if(action==='heal'){p.health=clamp(p.health+12);p.love+=2}
  if(action==='train'){p.energy=clamp(p.energy-8);p.happy=clamp(p.happy+4);p.love+=1}
  if(action==='explore'){p.happy=clamp(p.happy+6);p.energy=clamp(p.energy-6);p.love+=2}
  render();
  bubble(messages[action]||'Done!');
}
function init(){
  pets.forEach((p,i)=>{const opt=document.createElement('option');opt.value=String(i);opt.textContent=`${p.name} · ${p.type}`;$('petSelect').appendChild(opt)});
  $('petSelect').addEventListener('change',e=>{idx=Number(e.target.value)||0;render();bubble('Pet selected 🐾')});
  document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',()=>act(btn.dataset.action)));
  render();
}
init();
</script>
</body>
</html>
