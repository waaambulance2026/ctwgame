<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Waaambulance PetBot - Transparent Toy Test</title>
<style>
:root{
  --pink:#f35aad; --pink2:#ffb7df; --blue:#18b9ea; --blue2:#91eeff; --ink:#24152e;
  --yellow:#ffe66f; --lcd:#a9b878; --bg1:#dff6ff; --bg2:#fff2fb;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:radial-gradient(circle at 50% 20%, #ffffff 0, var(--bg2) 45%, var(--bg1) 100%)}
button,select{font:inherit}
button{cursor:pointer;border:0}
.app{position:relative;width:100vw;height:100dvh;overflow:hidden;display:grid;place-items:center;background:radial-gradient(circle at 50% 55%, rgba(255,255,255,.98) 0, rgba(245,115,188,.16) 45%, rgba(20,184,232,.16) 100%)}
.glow{position:absolute;inset:0;pointer-events:none;background:
radial-gradient(circle at 35% 72%, rgba(243,90,173,.28), transparent 15%),
radial-gradient(circle at 65% 72%, rgba(24,185,234,.22), transparent 15%),
radial-gradient(circle at 50% 38%, rgba(255,255,255,.66), transparent 18%);
filter:blur(24px)}
.topHud{position:absolute;z-index:40;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);width:min(760px,calc(100vw - 18px));display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.78);border:2px solid rgba(255,255,255,.9);box-shadow:0 10px 24px rgba(0,0,0,.12);backdrop-filter:blur(8px)}
.badge{font-weight:1000;color:#9f174f;background:linear-gradient(#fff,#ffe5f5);border-radius:999px;padding:8px 12px;box-shadow:inset 0 -4px 0 rgba(240,95,178,.16)}
.back{font-weight:1000;border-radius:999px;padding:10px 14px;background:linear-gradient(#3b1647,#1f0f2a);color:#fff;box-shadow:0 5px 0 #0b0610}.back:active{transform:translateY(4px);box-shadow:0 1px 0 #0b0610}
.selector{position:absolute;z-index:35;top:68px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;padding:6px;background:rgba(255,255,255,.84);border:2px solid rgba(255,255,255,.95);border-radius:999px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.selector select{max-width:min(52vw,340px);border:0;border-radius:999px;padding:8px 12px;font-weight:1000;color:var(--ink);background:#fff}
.selector button{width:38px;height:38px;border-radius:50%;font-weight:1000;background:linear-gradient(#fffca8,#ffd749);box-shadow:0 4px 0 #bc9300}.selector button:active{transform:translateY(3px);box-shadow:0 1px 0 #bc9300}
.stage{position:relative;width:min(96vw,calc(90dvh * .80));height:min(90dvh,calc(96vw * 1.249));max-width:760px;max-height:950px;filter:drop-shadow(0 0 26px rgba(243,90,173,.32)) drop-shadow(0 0 28px rgba(24,185,234,.25)) drop-shadow(0 18px 35px rgba(0,0,0,.18));}
.device{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none;pointer-events:none}
.deviceShellGlow{position:absolute;left:13%;right:13%;top:4%;bottom:6%;border-radius:46% 46% 42% 42%/28% 28% 32% 32%;pointer-events:none;box-shadow:0 0 36px rgba(243,90,173,.32), 0 0 42px rgba(24,185,234,.22);opacity:.95}
.lcd{position:absolute;left:19.3%;top:33.5%;width:61.5%;height:32.5%;border-radius:4.5%/7%;overflow:hidden;background:#bac98a;border:3px solid rgba(56,75,32,.60);box-shadow:inset 0 0 0 2px rgba(255,255,255,.18), inset 0 0 50px rgba(0,0,0,.08)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.06) 1px,transparent 1px);background-size:10px 10px;opacity:.50;pointer-events:none}
.lcdTop{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px 4px;font-size:clamp(10px,1.35vw,15px);font-weight:1000;letter-spacing:.02em}
.petLine{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56%}
.pixelPet{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);width:54%;height:60%;display:grid;place-items:center;z-index:2}
.petPhoto{max-width:100%;max-height:100%;object-fit:contain;filter:grayscale(1) contrast(2.35) sepia(.38) saturate(.55) brightness(.72);mix-blend-mode:multiply;opacity:.96}
.petFallback{font-size:clamp(46px,10vw,120px);filter:grayscale(1) contrast(2);opacity:.75}
.lcdBottom{position:absolute;left:8px;right:8px;bottom:7px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:3}
.stat{height:clamp(7px,1.25vw,12px);border:2px solid rgba(31,44,23,.72);border-radius:999px;overflow:hidden;background:rgba(31,44,23,.18)}
.stat span{display:block;height:100%;width:50%;background:#26391d}
.bubble{position:absolute;z-index:50;left:50%;top:26.8%;transform:translateX(-50%) scale(.94);padding:8px 13px;border-radius:999px;background:linear-gradient(#fff,#ffe3f4);border:3px solid var(--pink);box-shadow:0 0 18px rgba(240,95,178,.78),0 8px 14px rgba(0,0,0,.16);font-weight:1000;font-size:clamp(12px,1.8vw,18px);opacity:0;pointer-events:none}
.bubble.show{animation:pop .95s ease}
@keyframes pop{0%{opacity:0;transform:translateX(-50%) translateY(14px) scale(.82)}18%,78%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-10px) scale(.94)}}
.hot{position:absolute;z-index:20;border-radius:999px;background:rgba(255,255,255,.01);outline:0;transition:transform .08s ease, box-shadow .12s ease, background .12s ease}
.hot::before{content:'';position:absolute;inset:-6px;border-radius:inherit;opacity:0;transition:opacity .12s ease, box-shadow .12s ease;pointer-events:none}
.hot:hover::before,.hot:focus-visible::before,.hot.is-pressed::before{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.5),0 0 18px rgba(243,90,173,.75),0 0 24px rgba(24,185,234,.65)}
.hot:focus-visible{outline:0}
.hot:hover{background:rgba(255,255,255,.10)}
.hot.is-pressed{transform:scale(.92)}
.hot::after{content:attr(data-label);position:absolute;left:50%;bottom:108%;transform:translateX(-50%);white-space:nowrap;padding:5px 8px;border-radius:999px;background:rgba(36,21,46,.88);color:#fff;font-size:11px;font-weight:900;opacity:0;pointer-events:none}
.hot:hover::after,.hot:focus-visible::after{opacity:1}
.hot.siren{left:30%;top:2%;width:40%;height:12%;border-radius:20px}
.hot.feed{left:15.1%;top:71%;width:15.7%;height:10.1%}
.hot.heal{left:68.9%;top:71%;width:15.7%;height:10.1%}
.hot.prev{left:31.3%;top:82.2%;width:9.5%;height:6.9%}
.hot.next{left:59.3%;top:82.2%;width:9.5%;height:6.9%}
.hot.play{left:40.6%;top:67.7%;width:18.9%;height:17.3%;border-radius:44%}
.hot.rest{left:44.7%;top:84.2%;width:10.8%;height:8.1%;border-radius:42%}
.hot.useMain{left:8.8%;top:55%;width:10.8%;height:12.4%;border-radius:20px}
.hot.useSide{left:80.5%;top:55%;width:10.8%;height:12.4%;border-radius:20px}
.screenTap{position:absolute;z-index:18;left:19.3%;top:33.5%;width:61.5%;height:32.5%;border-radius:4.5%/7%;background:transparent}
.status{position:absolute;z-index:40;left:50%;bottom:max(10px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(820px,calc(100vw - 18px));padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.86);border:2px solid rgba(20,184,232,.45);box-shadow:0 8px 22px rgba(0,0,0,.13);font-size:clamp(11px,1.25vw,14px);font-weight:900;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.help{position:absolute;right:8px;top:8px;z-index:5;padding:4px 6px;border-radius:999px;background:rgba(255,255,255,.45);font-size:11px;font-weight:900;opacity:.8}
@media(max-width:700px){.topHud{top:6px;padding:6px 8px}.badge{font-size:11px;padding:6px 8px}.back{font-size:11px;padding:7px 9px}.selector{top:54px}.selector select{max-width:50vw}.stage{width:min(98vw,calc(86dvh * .80));height:min(86dvh,calc(98vw * 1.249))}.status{font-size:10px;padding:7px 9px}}
@media(max-height:690px){.topHud{display:none}.selector{top:6px}.stage{width:min(90vw,calc(94dvh * .80));height:min(94dvh,calc(90vw * 1.249))}.status{bottom:6px;font-size:10px;padding:6px 10px}}
</style>
</head>
<body>
<div class="app">
  <div class="glow"></div>
  <div class="topHud"><span class="badge">Approved transparent toy test</span><button class="back" onclick="location.href='index.html'">← Back to game</button></div>
  <div class="selector"><button id="prevSmall" aria-label="Previous pet">←</button><select id="petSelect" aria-label="Choose pet"></select><button id="nextSmall" aria-label="Next pet">→</button></div>
  <main class="stage" aria-label="Waaambulance Tamagotchi toy">
    <div class="deviceShellGlow" aria-hidden="true"></div>
    <img src="petbot_device.png" alt="Waaambulance PetBot device" class="device">
    <section class="lcd" aria-label="Pet screen">
      <div class="help">Tap screen = info</div>
      <div class="grid"></div>
      <div class="lcdTop"><span>♡ <b id="loveScore">128</b></span><span class="petLine" id="petNameTop">Bubbles</span><span>☩ ☺ ⚙</span></div>
      <div class="pixelPet"><img class="petPhoto" id="petImg" alt="selected pet"><div class="petFallback" id="petFallback" hidden>🚑</div></div>
      <div class="lcdBottom"><div class="stat"><span id="hungerBar"></span></div><div class="stat"><span id="happyBar"></span></div><div class="stat"><span id="energyBar"></span></div><div class="stat"><span id="healthBar"></span></div></div>
    </section>
    <button class="screenTap" data-action="info" aria-label="Show pet info"></button>
    <div class="bubble" id="effectBubble">Ready!</div>
    <button class="hot siren" data-action="explore" data-label="Explore" aria-label="Explore"></button>
    <button class="hot feed" data-action="feed" data-label="Feed" aria-label="Feed"></button>
    <button class="hot heal" data-action="heal" data-label="Heal" aria-label="Heal"></button>
    <button class="hot prev" data-action="prev" data-label="Previous pet" aria-label="Previous pet"></button>
    <button class="hot next" data-action="next" data-label="Next pet" aria-label="Next pet"></button>
    <button class="hot play" data-action="play" data-label="Play / Comfort" aria-label="Play or comfort"></button>
    <button class="hot rest" data-action="rest" data-label="Rest" aria-label="Rest"></button>
    <button class="hot useMain" data-action="useMain" data-label="Use as main" aria-label="Use as main"></button>
    <button class="hot useSide" data-action="useSide" data-label="Use as sidekick" aria-label="Use as sidekick"></button>
  </main>
  <div class="status" id="status"><strong>Safe test:</strong> transparent toy image with improved real button hotspots.</div>
</div>
<script>
const pets=[
  {name:'Bubbles',type:'Axolotl',level:5,love:128,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781797059/ax_idle_001.png',hunger:68,happy:80,energy:48,health:90},
  {name:'Pura',type:'Mascot',level:7,love:211,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798378/pura_idle_001.png',hunger:78,happy:72,energy:65,health:86},
  {name:'Moonbeam',type:'Unicorn',level:4,love:95,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798484/unicorn_idle_001.png',hunger:52,happy:60,energy:82,health:75},
  {name:'Hoots',type:'Owl',level:3,love:84,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1782133620/owl_idle_001.png',hunger:58,happy:63,energy:74,health:80}
];
let idx=0;
const $=id=>document.getElementById(id);
function clamp(v){return Math.max(0,Math.min(100,v));}
function setWidth(id,value){$(id).style.width=clamp(value)+'%';}
function statusText(html){$('status').innerHTML=html;}
function render(){
  const p=pets[idx];
  $('petSelect').value=String(idx);
  $('petNameTop').textContent=p.name+' · '+p.type;
  $('loveScore').textContent=p.love;
  $('petImg').src=p.img;
  $('petImg').alt=p.name+' the '+p.type;
  setWidth('hungerBar',p.hunger);setWidth('happyBar',p.happy);setWidth('energyBar',p.energy);setWidth('healthBar',p.health);
  statusText('<strong>'+p.name+'</strong> · LV '+String(p.level).padStart(2,'0')+' · hearts feed/heal · arrows switch pets · pacifier plays · bottom button rests · top siren explores.');
}
function bubble(text){
  const b=$('effectBubble');b.textContent=text;b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
  const lcd=document.querySelector('.lcd');lcd.animate([{filter:'brightness(1)'},{filter:'brightness(1.18)'},{filter:'brightness(1)'}],{duration:420,easing:'ease-out'});
}
function press(btn){btn.classList.add('is-pressed');setTimeout(()=>btn.classList.remove('is-pressed'),130)}
function changePet(delta){idx=(idx+delta+pets.length)%pets.length;render();bubble('Pet changed 🐾');}
function act(action){
  const p=pets[idx];
  if(action==='prev')return changePet(-1);
  if(action==='next')return changePet(1);
  if(action==='feed'){p.hunger=clamp(p.hunger+12);p.energy=clamp(p.energy-3);p.love+=1;bubble('Fed! 🍔');}
  else if(action==='play'){p.happy=clamp(p.happy+12);p.energy=clamp(p.energy-6);p.love+=3;bubble('Play time! 🧸');}
  else if(action==='rest'){p.energy=clamp(p.energy+16);p.hunger=clamp(p.hunger-4);bubble('Resting 🌙');}
  else if(action==='heal'){p.health=clamp(p.health+12);p.love+=2;bubble('Healed! 💊');}
  else if(action==='explore'){p.happy=clamp(p.happy+6);p.energy=clamp(p.energy-6);p.love+=2;bubble('Exploring! 🧭');}
  else if(action==='useMain'){bubble('Use as main ⭐');}
  else if(action==='useSide'){bubble('Use as sidekick 🐾');}
  else if(action==='info'){bubble(p.name+' · hunger '+p.hunger+' · happy '+p.happy+' · energy '+p.energy+' · health '+p.health);}
  render();
}
function init(){
  pets.forEach((p,i)=>{const opt=document.createElement('option');opt.value=String(i);opt.textContent=p.name+' · '+p.type;$('petSelect').appendChild(opt);});
  $('petSelect').addEventListener('change',e=>{idx=Number(e.target.value)||0;render();bubble('Pet selected 🐾');});
  $('prevSmall').addEventListener('click',()=>changePet(-1));$('nextSmall').addEventListener('click',()=>changePet(1));
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click',()=>{press(btn);act(btn.dataset.action);});
  });
  document.addEventListener('keydown',e=>{
    const map={ArrowLeft:'prev',ArrowRight:'next',ArrowUp:'feed',ArrowDown:'rest',' ':'play',Enter:'play',h:'heal',H:'heal',e:'explore',E:'explore',m:'useMain',M:'useMain',s:'useSide',S:'useSide',i:'info',I:'info'};
    if(map[e.key]){e.preventDefault();act(map[e.key]);}
  });
  $('petImg').addEventListener('error',()=>{$('petImg').hidden=true;$('petFallback').hidden=false;});
  $('petImg').addEventListener('load',()=>{$('petImg').hidden=false;$('petFallback').hidden=true;});
  render();
}
init();
</script>
</body>
</html>
