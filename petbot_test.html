<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CTW PetBot Tamagotchi - Stage 35</title>
<style>
:root{
  --ink:#16223f;
  --pink:#f7b5dc;
  --blue:#9feaff;
  --lcd:#dff7fb;
  --lcd2:#bfe9ee;
  --shadow:rgba(18,20,45,.25);
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at 50% 38%,#fff 0,#fff2fb 38%,#dff7ff 100%);font-family:Verdana,Arial,sans-serif;color:var(--ink)}
body{display:grid;place-items:center}
#app{position:fixed;inset:0;display:grid;place-items:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.device{position:relative;width:min(94vw,calc(98vh * 0.6667));aspect-ratio:2/3;filter:drop-shadow(0 18px 30px var(--shadow));background:none}
.device::after{content:"";position:absolute;inset:0;background:url('petbot_device.png') center/contain no-repeat;z-index:12;pointer-events:none}
.lcd{position:absolute;z-index:2;left:20.6%;top:39.2%;width:58%;height:27%;border-radius:6%/10%;overflow:hidden;background:linear-gradient(180deg,var(--lcd),var(--lcd2));display:flex;flex-direction:column}
.top{height:18%;min-height:19px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:4px;padding:2px 6px;font-weight:900;font-size:clamp(8px,1.02vw,13px);background:rgba(255,255,255,.12)}
.body{position:relative;flex:1;min-height:0;padding:5px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:4;overflow:hidden}
.choiceList{width:100%;height:100%;display:flex;flex-direction:column;gap:4px;justify-content:center}
.questGameGlass{position:absolute;inset:0;width:100%;height:100%;background:transparent !important;pointer-events:auto !important;z-index:5}

/* Stage 8: Quest game display fix - ensure game content fills LCD and prevents blue screen */
body.questPlaying .lcd{background:transparent !important;box-shadow:inset 0 0 0 2px rgba(21,34,63,.35) !important;display:flex !important;flex-direction:column !important;overflow:hidden !important}
body.questPlaying .lcd:before{opacity:.22 !important;z-index:20 !important}
body.questPlaying .top{display:none !important}
body.questPlaying .body{display:none !important}
body.questPlaying .questGameGlass{position:absolute !important;inset:0 !important;width:100% !important;height:100% !important;background:transparent !important;pointer-events:auto !important;z-index:6 !important;overflow:hidden !important}

/* Stage 19: Fullscreen CSS mode */
html.cssFullscreen,body.cssFullscreen{width:100% !important;height:100% !important;overflow:hidden !important;background:radial-gradient(circle at 50% 38%,#fff 0,#fff2fb 38%,#dff7ff 100%) !important}
html.cssFullscreen #app,body.cssFullscreen #app{position:fixed !important;inset:0 !important;display:grid !important;place-items:center !important}
html.cssFullscreen .device,body.cssFullscreen .device{width:min(99vw,calc(99dvh * .6667)) !important;max-height:99dvh !important}

</style>

<style id="stage38-habitat-css">
/* STAGE 38: habitat loading/error text is a small top label, not a fake emoji pet. */
.habitatLoadingCard{position:absolute;left:8px;right:8px;top:6px;z-index:160;padding:4px 7px;border-radius:10px;background:rgba(255,247,189,.90);color:#24152e;font-weight:1000;font-size:clamp(8px,.82vw,11px);text-align:center;line-height:1;z-index:999}
.habitatFullScreen .habitatPetEmoji{display:none !important}
</style>
</head>
<body>
<div id="app">
  <div class="device" aria-label="CTW Tamagotchi PetBot">
    <div class="lcd" id="lcd"></div>
    <button class="hit siren" id="btnSiren" aria-label="Full screen"></button>
    <button class="hit exit" id="btnExit" aria-label="Back to game"></button>
    <button class="hit prev" id="btnPrev" aria-label="Previous"></button>
    <button class="hit select" id="btnSelect" aria-label="Select"></button>
    <button class="hit next" id="btnNext" aria-label="Next"></button>
  </div>
</div>
<pre id="debug" class="debug"></pre>
<script>
(function(){
'use strict';

function render(){
  const lcd=document.getElementById('lcd');
  if(!lcd)return;
  
  // When quest is playing, show game glass that fills the LCD
  if(document.body.classList.contains('questPlaying')){
    lcd.innerHTML='<div class="questGameGlass"></div>';
  }
}

// Initialize render
setTimeout(()=>render(),100);
})();
</script>
</body>
</html>
