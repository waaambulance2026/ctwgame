<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CTW PetBot Tamagotchi - Stage 35</title>
<style>
:root{
  --ink:#16223f;
  --pink:#f7b5dc;
  --blue:#9feaff;
  --lcd:#dff7fb;
  --lcd2:#bfe9ee;
  --shadow:rgba(18,20,45,.25);
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at 50% 38%,#fff 0,#fff2fb 38%,#dff7ff 100%);font-family:Verdana,Arial,sans-serif;color:var(--ink);touch-action:none}
body{display:grid;place-items:center}
#app{position:fixed;inset:0;display:grid;place-items:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.device{position:relative;width:min(94vw,calc(98vh * 0.6667));aspect-ratio:2/3;filter:drop-shadow(0 18px 30px var(--shadow));background:none}
.device::after{content:"";position:absolute;inset:0;background:url('petbot_device.png') center/contain no-repeat;z-index:12;pointer-events:none}
.lcd{position:absolute;z-index:2;left:20.6%;top:39.2%;width:58%;height:27%;border-radius:6%/10%;overflow:hidden;background:linear-gradient(180deg,var(--lcd),var(--lcd2));box-shadow:inset 0 0 0 2px rgba(22,34,63,.18)}
.lcd:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.25),transparent 18%,transparent 82%,rgba(255,255,255,.20)),repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 2px);z-index:3}
.top{height:18%;min-height:19px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:4px;padding:2px 6px;font-weight:900;font-size:clamp(8px,1.02vw,13px);background:rgba(255,255,255,.12)}
.body{position:relative;flex:1;min-height:0;padding:5px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:4}
.questGameGlass{position:absolute;inset:0;pointer-events:none;background:transparent!important;width:100%;height:100%;z-index:5}
</style>
</head>
<body>
<div id="app">
  <div class="device" aria-label="CTW Tamagotchi PetBot">
    <div class="lcd" id="lcd"></div>
    <button class="hit siren" id="btnSiren" aria-label="Full screen"></button>
    <button class="hit exit" id="btnExit" aria-label="Back to game"></button>
    <button class="hit prev" id="btnPrev" aria-label="Previous"></button>
    <button class="hit select" id="btnSelect" aria-label="Select"></button>
    <button class="hit next" id="btnNext" aria-label="Next"></button>
  </div>
</div>
<pre id="debug" class="debug"></pre>
<script>console.log('PetBot HTML loaded');</script>
</body>
</html>
