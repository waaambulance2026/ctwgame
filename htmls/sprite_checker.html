<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CTW Sprite Checker</title>
  <style>
    body{font-family:Arial,sans-serif;background:#101022;color:#fff;margin:0;padding:20px}
    h1{margin:0 0 10px}
    p{opacity:.92}
    .topbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:12px 0 18px}
    button{background:#F5C542;color:#241634;border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
    button.secondary{background:#d282c2;color:#241634}
    input[type="text"]{background:#1d142c;color:#fff;border:1px solid #ffffff33;border-radius:10px;padding:10px 12px;min-width:280px}
    .status{padding:10px 12px;border-radius:12px;background:#ffffff14;border:1px solid #ffffff22;margin-bottom:18px;white-space:pre-wrap}
    .group{margin:18px 0;padding:14px;border:1px solid #ffffff33;border-radius:16px;background:#ffffff12}
    .frames{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    .card{background:#1d142c;border:1px solid #ffffff22;border-radius:12px;padding:8px;text-align:center;min-height:190px}
    .card img{max-width:100%;height:96px;object-fit:contain;background:#76C7D8;border-radius:8px}
    .ok{color:#b6ffcf;font-weight:700;margin-top:6px}
    .bad{color:#ff9ca8;font-weight:700;margin-top:6px}
    .path{font-size:10px;word-break:break-all;opacity:.86;margin-top:6px;line-height:1.3}
    .small{font-size:12px;opacity:.85}
    .muted{opacity:.8}
  </style>
</head>
<body>
  <h1>CTW Sprite Checker</h1>
  <p>This checks <strong>../jsons/sprite_manifest.json</strong> from the same folder as this HTML. It adds a cache-buster so you can see fresh manifest updates.</p>

  <div class="topbar">
    <button id="reloadBtn">Reload manifest</button>
    <button id="openManifestBtn" class="secondary">Open manifest JSON</button>
    <input id="manifestPath" type="text" value="./../jsons/sprite_manifest.json" />
  </div>

  <div id="status" class="status">Loading…</div>
  <div id="out"></div>

  <script>
    const statusEl = document.getElementById('status');
    const out = document.getElementById('out');
    const manifestPathInput = document.getElementById('manifestPath');

    function setStatus(text){ statusEl.textContent = text; }
    function normalizeCandidates(value){
      if(value == null) return [];
      if(Array.isArray(value)){
        if(value.length && Array.isArray(value[0])) return value.flat().filter(Boolean);
        return value.filter(Boolean);
      }
      if(typeof value === 'string') return [value];
      return [];
    }
    function assetGroup(title){
      const sec = document.createElement('section');
      sec.className = 'group';
      sec.innerHTML = `<h2>${title}</h2><div class="frames"></div>`;
      out.appendChild(sec);
      return sec.querySelector('.frames');
    }
    function loadFirst(list){
      return new Promise(resolve => {
        let i = 0;
        function next(){
          if(i >= list.length) return resolve(null);
          const src = list[i++];
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => resolve(src);
          img.onerror = next;
          img.src = src;
        }
        next();
      });
    }
    async function addCard(grid, label, value){
      const candidates = normalizeCandidates(value);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="small muted">${label}</div><div class="small">Checking…</div>`;
      grid.appendChild(card);
      const ok = await loadFirst(candidates);
      if(ok){
        card.innerHTML = '';
        const img = new Image();
        img.src = ok;
        card.appendChild(img);
        const okEl = document.createElement('div');
        okEl.className = 'ok';
        okEl.textContent = `${label}: OK`;
        card.appendChild(okEl);
        const p = document.createElement('div');
        p.className = 'path';
        p.textContent = ok;
        card.appendChild(p);
      } else {
        card.innerHTML = `<div class="bad">${label}: MISSING</div><div class="path">${candidates.join('\nOR\n') || 'No URL found in manifest'}</div>`;
      }
    }

    async function renderManifest(manifest){
      out.innerHTML = '';
      const note = [];
      if(manifest.cloudName) note.push(`Cloud name: ${manifest.cloudName}`);
      if(manifest.baseUrl) note.push(`Base URL: ${manifest.baseUrl}`);
      if(manifest.note) note.push(`Note: ${manifest.note}`);
      setStatus(`Manifest loaded successfully.\n${note.join('\n')}`);

      if(manifest.backgrounds){
        for(const day of ['day','night']){
          if(!manifest.backgrounds[day]) continue;
          const parts = ['sky','hills','ground'];
          const grid = assetGroup(`backgrounds — ${day}`);
          for(const part of parts){
            if(manifest.backgrounds[day][part] !== undefined){
              await addCard(grid, part, manifest.backgrounds[day][part]);
            }
          }
        }
      }

      if(manifest.characters){
        for(const [charKey, charData] of Object.entries(manifest.characters)){
          const framesObj = charData.frames || {};
          for(const [state, frames] of Object.entries(framesObj)){
            const grid = assetGroup(`${charKey} — ${state}`);
            let idx = 1;
            for(const frame of frames){
              await addCard(grid, String(idx++), frame);
            }
          }
        }
      }
    }

    async function loadManifest(){
      const rawPath = manifestPathInput.value.trim() || './../jsons/sprite_manifest.json';
      const url = rawPath + (rawPath.includes('?') ? '&' : '?') + 'v=' + Date.now();
      setStatus(`Loading manifest from:\n${url}`);
      out.innerHTML = '';
      try{
        const res = await fetch(url, { cache: 'no-store' });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        const manifest = await res.json();
        await renderManifest(manifest);
      } catch(err){
        setStatus(`Could not load manifest.\n${err.message}\n\nMake sure this HTML and ../jsons/sprite_manifest.json are in the same GitHub folder.`);
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', loadManifest);
    document.getElementById('openManifestBtn').addEventListener('click', () => {
      const rawPath = manifestPathInput.value.trim() || './../jsons/sprite_manifest.json';
      window.open(rawPath + (rawPath.includes('?') ? '&' : '?') + 'view=' + Date.now(), '_blank');
    });

    loadManifest();
  </script>
</body>
</html>
