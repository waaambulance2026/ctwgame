<!doctype html><html><head><meta charset="utf-8"><title>CTW Cloudinary Frame Count Test</title><style>body{font-family:Arial;background:#101827;color:#fff;padding:20px}.ok{color:#66ff99}.bad{color:#ff7777}.warn{color:#ffd76a}img{max-width:130px;max-height:130px;background:#333;margin:6px;border:1px solid #555}.row{margin:10px 0;padding:10px;background:#1d2740;border-radius:8px}code{color:#ffe484;word-break:break-all}.frames{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.tiny{font-size:12px;opacity:.85}</style></head><body><h1>CTW Cloudinary Frame Count Test</h1><p>This tests your real Cloudinary tree and counts however many frames exist in each folder. It does not assume 10 frames.</p><div id="out"></div><script>
const out=document.getElementById('out');
const base='https://res.cloudinary.com/dpwlfmhia/image/upload/v1781797065/ctwgame/';
const actions={ax:['idle','walk','jump'],pura:['idle','walk','jump'],owl:['idle','walk','jump','play','rest'],unicorn:['idle','walk','jump']};
function pad3(n){return String(n).padStart(3,'0')}
function pad2(n){return String(n).padStart(2,'0')}
function fileName(c,a,n){ if(c==='owl'&&a==='walk')return `owl_walk${pad2(n)}.png`; if(c==='owl')return `owl_${a}_${n}.png`; return `${c}_${a}_${pad3(n)}.png`; }
function url(c,a,n){return `${base}characters/${c}/${a}/${fileName(c,a,n)}`}
function testImage(src,timeout=900){return new Promise(resolve=>{const im=new Image();let done=false;const finish=ok=>{if(done)return;done=true;clearTimeout(t);resolve(ok?im:null)};const t=setTimeout(()=>finish(false),timeout);im.onload=()=>finish(true);im.onerror=()=>finish(false);im.src=src;});}
async function countFrames(c,a){const row=document.createElement('div');row.className='row';row.innerHTML=`<b>${c} / ${a}</b> — testing… <div class="tiny"><code>${url(c,a,1)}</code></div><div class="frames"></div>`;out.appendChild(row);const frames=row.querySelector('.frames');let found=0,misses=0;for(let n=1;n<=60;n++){const u=url(c,a,n);const img=await testImage(u);if(img){found++;misses=0;const copy=new Image();copy.src=u;copy.title=u;frames.appendChild(copy);}else{misses++; if(found>0&&misses>=2)break; if(found===0&&misses>=2)break;}}row.querySelector('b').insertAdjacentHTML('afterend',` — ${found?'<span class="ok">OK</span>':'<span class="bad">FAILED</span>'} ${found} frame(s) found`);}
async function main(){for(const c of Object.keys(actions)){for(const a of actions[c]) await countFrames(c,a);}const r=document.createElement('div');r.className='row';out.appendChild(r);fetch('jsons/sprite_manifest.json',{cache:'no-store'}).then(res=>{r.innerHTML=`Manifest — ${res.ok?'<b class="ok">OK</b>':'<b class="bad">FAILED '+res.status+'</b>'}<br><code>jsons/sprite_manifest.json</code>`;}).catch(e=>{r.innerHTML=`Manifest — <b class="bad">FAILED</b> ${e}`});}
main();
</script></body></html>
