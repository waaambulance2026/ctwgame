<!doctype html><html><head><meta charset="utf-8"><title>CTW Cloudinary Tree Test</title><style>body{font-family:Arial;background:#101827;color:#fff;padding:20px}.ok{color:#66ff99}.bad{color:#ff7777}img{max-width:160px;max-height:160px;background:#333;margin:8px;border:1px solid #555}.row{margin:10px 0;padding:10px;background:#1d2740;border-radius:8px}code{color:#ffe484;word-break:break-all}</style></head><body><h1>CTW Cloudinary Tree Test</h1><p>This tests your real Cloudinary folder tree: <code>ctwgame/characters/...</code> and <code>ctwgame/layers/...</code>.</p><div id="out"></div><script>
const out=document.getElementById('out');
const base='https://res.cloudinary.com/dpwlfmhia/image/upload/';
const tests=[
 ['Ax idle tree',base+'v1781797065/ctwgame/characters/ax/idle/ax_idle_001.png'],
 ['Ax idle old root fallback',base+'v1781797065/ax_idle_001.png'],
 ['Ax walk tree',base+'v1781797065/ctwgame/characters/ax/walk/ax_walk_001.png'],
 ['Ax jump tree',base+'v1781797065/ctwgame/characters/ax/jump/ax_jump_001.png'],
 ['Pura idle tree',base+'v1781797065/ctwgame/characters/pura/idle/pura_idle_001.png'],
 ['Pura walk tree',base+'v1781797065/ctwgame/characters/pura/walk/pura_walk_001.png'],
 ['Pura jump tree',base+'v1781797065/ctwgame/characters/pura/jump/pura_jump_001.png'],
 ['Owl idle tree',base+'v1781797065/ctwgame/characters/owl/idle/owl_idle_1.png'],
 ['Owl walk tree',base+'v1781797065/ctwgame/characters/owl/walk/owl_walk01.png'],
 ['Owl jump tree',base+'v1781797065/ctwgame/characters/owl/jump/owl_jump_1.png'],
 ['Unicorn idle tree',base+'v1781797065/ctwgame/characters/unicorn/idle/unicorn_idle_001.png'],
 ['Unicorn walk tree',base+'v1781797065/ctwgame/characters/unicorn/walk/unicorn_walk_001.png'],
 ['Unicorn jump tree',base+'v1781797065/ctwgame/characters/unicorn/jump/unicorn_jump_001.png'],
 ['Day sky tree',base+'v1781797065/ctwgame/layers/backgrounds/day_sky.png'],
 ['Day hills tree',base+'v1781797065/ctwgame/layers/middle-ground/day_hills.png'],
 ['Day ground tree',base+'v1781797065/ctwgame/layers/ground/day_ground.png'],
 ['Manifest','jsons/sprite_manifest.json']
];
function row(name,url){const r=document.createElement('div');r.className='row';r.innerHTML=`${name} — testing<br><code>${url}</code>`;out.appendChild(r);return r;}
function testImg(name,url){const r=row(name,url);const img=new Image();img.onload=()=>{r.innerHTML=`${name} — <b class="ok">OK</b> ${img.naturalWidth}×${img.naturalHeight}<br><code>${url}</code><br>`;r.appendChild(img)};img.onerror=()=>{r.innerHTML=`${name} — <b class="bad">FAILED</b><br><code>${url}</code>`};img.src=url;}
for(const [name,url] of tests){ if(url.endsWith('.json')){const r=row(name,url);fetch(url,{cache:'no-store'}).then(res=>{r.innerHTML=`${name} — ${res.ok?'<b class="ok">OK</b>':'<b class="bad">FAILED '+res.status+'</b>'}<br><code>${url}</code>`;}).catch(e=>r.innerHTML=`${name} — <b class="bad">FAILED</b> ${e}`)} else testImg(name,url); }
</script></body></html>
