<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><title>PetBot A - Dashboard Windscreen</title>
<style>
:root{--pink:#f05fb2;--blue:#28b9e8;--red:#ef3f43;--cream:#fffaf3;--ink:#24152e;--yellow:#ffe66f;--green:#47d990;--roomA:#dff8ff;--roomB:#fff4fb;--roomC:#ffd5ef}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:radial-gradient(circle at 50% 0%,#e9fbff 0 20%,#ffd8ee 55%,#ef7bc0 115%)}button,select{font:inherit}button{cursor:pointer;border:0}.app{width:100vw;height:100dvh;display:grid;place-items:center;padding:8px;overflow:hidden}.dash{position:relative;width:min(1900px,100vw);height:min(1080px,100dvh);border-radius:42px;background:linear-gradient(145deg,#fffdf8 0 42%,#ffe4f4 43% 100%);border:7px solid white;box-shadow:0 0 0 10px var(--red),0 25px 55px rgba(36,21,46,.35),0 0 45px rgba(240,95,178,.75),0 0 82px rgba(40,185,232,.65);overflow:hidden;display:grid;grid-template-rows:112px 1fr 160px}.dash:before,.dash:after{content:"";position:absolute;top:115px;bottom:145px;width:15%;background:linear-gradient(90deg,#e21f2a,#ff6970 45%,#f03440);box-shadow:inset 24px 0 36px rgba(255,255,255,.34),inset -18px 0 28px rgba(90,0,0,.22);z-index:0}.dash:before{left:0}.dash:after{right:0;transform:scaleX(-1)}.top{position:relative;z-index:3;display:grid;grid-template-columns:190px 1fr 190px;align-items:center;padding:10px 24px;background:linear-gradient(#fff,#fff8fb);border-bottom:8px solid #f0434b}.siren{justify-self:center;width:min(420px,34vw);height:56px;border:8px solid #1c2638;border-radius:16px;background:#111;display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:7px;box-shadow:0 0 24px rgba(40,185,232,.9),inset 0 0 12px #000}.lamp{border-radius:9px;box-shadow:inset 0 7px 8px rgba(255,255,255,.45),inset 0 -6px 9px rgba(0,0,0,.22)}.blue{background:linear-gradient(#72ddff,#087fd5)}.red{background:linear-gradient(#ff7479,#e21f2a)}.white{background:linear-gradient(#fff,#dce5ee)}h1{margin:0;text-align:center;font-size:clamp(33px,4.6vw,78px);color:#ef3f43;text-shadow:3px 3px 0 white,6px 6px 0 rgba(40,185,232,.58);letter-spacing:-2px}.badge,.back{border-radius:999px;padding:12px 18px;font-weight:1000;background:linear-gradient(#fff17e,#ffd746);box-shadow:0 7px 0 #b98e00;color:#24152e;text-decoration:none;text-align:center}.back{background:linear-gradient(#322042,#120d1c);color:#fff;box-shadow:0 7px 0 #050308}.body{position:relative;z-index:2;display:grid;grid-template-columns:minmax(170px,16%) 1fr minmax(170px,16%);gap:18px;padding:20px 24px 6px;min-height:0}.eyePanel{display:grid;gap:14px;align-content:center}.eye{height:min(190px,18vh);border-radius:48% 48% 42% 42%;background:radial-gradient(circle at 46% 48%,#101022 0 26%,#fff 27% 31%,#50d9ff 32% 54%,#02142a 55% 100%);border:9px solid #151629;box-shadow:0 14px 0 #070711,0 0 24px rgba(40,185,232,.75),inset 0 0 20px rgba(255,255,255,.35)}.statCard,.navCard{border-radius:24px;background:linear-gradient(180deg,#0b6db7,#064a89);border:5px solid white;color:white;padding:14px;box-shadow:0 10px 18px rgba(0,0,0,.25),inset 0 0 20px rgba(255,255,255,.15)}.level{background:linear-gradient(90deg,#ff62ba,#f249a8);border:4px solid white;border-radius:18px;text-align:center;font-size:clamp(19px,2vw,36px);font-weight:1000;padding:10px;margin-bottom:10px}.stat{display:grid;grid-template-columns:34px 1fr;gap:8px;align-items:center;margin:10px 0}.statIcon{width:34px;height:34px;border-radius:11px;background:#fff;display:grid;place-items:center;font-size:20px}.stat b{font-size:12px}.meter{height:15px;border-radius:999px;background:rgba(255,255,255,.26);border:3px solid rgba(255,255,255,.62);overflow:hidden}.meter span{display:block;height:100%;width:40%;background:linear-gradient(90deg,#ff62ba,#ffe16b);border-radius:999px}.stageBox{min-height:0;display:grid;grid-template-rows:auto 1fr auto;border-radius:42px;border:12px solid #151629;background:#111b32;box-shadow:0 18px 0 #080913,0 0 32px rgba(240,95,178,.92),0 0 68px rgba(40,185,232,.75);overflow:hidden}.screenTop{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 16px;background:linear-gradient(#d9f7ff,#aceeff);border-bottom:5px solid #55c7e7}.selector{display:flex;gap:8px;align-items:center}select{height:42px;border:0;border-radius:999px;padding:0 16px;background:white;font-weight:1000;box-shadow:inset 0 -3px rgba(40,185,232,.2)}.round{width:42px;height:42px;border-radius:50%;background:linear-gradient(#fffca8,#ffd749);box-shadow:0 5px 0 #bc9300;font-weight:1000}.petTitle{text-align:center;font-size:clamp(18px,2vw,32px);font-weight:1000;color:#005ca6}.love{background:linear-gradient(#0e98e9,#005aa8);color:white;padding:8px 14px;border-radius:999px;font-weight:1000}.windscreen{position:relative;min-height:0;display:grid;place-items:center;background:linear-gradient(180deg,var(--roomA),var(--roomB) 58%,var(--roomC) 59%);box-shadow:inset 0 -40px rgba(210,130,194,.20),inset 0 0 55px rgba(255,255,255,.86);overflow:hidden}.windscreen:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.65),transparent 32%);pointer-events:none}.roomName{position:absolute;left:18px;top:15px;border-radius:999px;background:rgba(255,255,255,.82);padding:8px 13px;font-weight:1000;border:3px solid rgba(40,185,232,.4)}.pet{position:relative;z-index:2;max-width:min(50%,55vh);max-height:82%;object-fit:contain;filter:drop-shadow(0 22px 22px rgba(0,0,0,.30))}.pet.bounce{animation:bounce .45s ease}@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(-18px) scale(1.04)}70%{transform:translateY(4px) scale(.98)}}.bubble{position:absolute;right:7%;top:13%;z-index:4;border-radius:999px;background:linear-gradient(#fff,#ffe9f8);border:4px solid var(--pink);padding:13px 18px;font-weight:1000;opacity:0;pointer-events:none;box-shadow:0 0 24px rgba(240,95,178,.7),0 10px 14px rgba(0,0,0,.18)}.bubble.show{animation:pop .95s ease}@keyframes pop{0%{opacity:0;transform:translateY(16px) scale(.8)}20%,75%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-14px) scale(.95)}}.quickBtns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 14px;background:linear-gradient(#d8f8ff,#bdeeff);border-top:5px solid #43bfdf}.btn{min-height:58px;border-radius:18px;background:linear-gradient(#fff8ff,#ffeaf8);box-shadow:0 7px 0 #d43b93,0 10px 12px rgba(0,0,0,.14),inset 0 10px 16px rgba(255,255,255,.85);font-weight:1000;color:#24152e}.btn.yellow{background:linear-gradient(#fff5a7,#ffe16b);box-shadow:0 7px 0 #c79700}.btn.blueBtn{background:linear-gradient(#f2ffff,#d8faff);box-shadow:0 7px 0 #0893cf}.btn:active,.round:active,.badge:active,.back:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.35)}.navCard{display:grid;gap:12px;align-content:center;background:linear-gradient(180deg,#ff7dac,#f0449a)}.bigToy{min-height:64px;border-radius:22px;background:linear-gradient(145deg,#fff,#fff5fb);border:5px solid white;box-shadow:0 9px 0 rgba(0,0,0,.25);font-size:20px;font-weight:1000}.bottom{position:relative;z-index:3;padding:12px 24px 20px;background:linear-gradient(#f5424b,#c91c29);display:grid;grid-template-columns:repeat(8,1fr);gap:10px;align-items:center}.status{position:absolute;left:24px;right:24px;bottom:8px;text-align:center;color:white;font-weight:900;text-shadow:0 2px rgba(0,0,0,.3)}@media(max-width:900px){.dash{height:100dvh;width:100vw;border-radius:0;border:0;box-shadow:none;grid-template-rows:78px 1fr 122px}.top{grid-template-columns:auto 1fr auto;padding:7px 8px}h1{font-size:25px;letter-spacing:-1px}.siren{display:none}.badge,.back{font-size:11px;padding:8px}.body{grid-template-columns:1fr;padding:8px}.eyePanel{display:none}.stageBox{border-width:7px;border-radius:22px}.screenTop{grid-template-columns:1fr auto;padding:8px}.petTitle{display:none}select{width:44vw;min-width:120px}.quickBtns{grid-template-columns:repeat(4,1fr);padding:6px;gap:5px}.btn{min-height:46px;border-radius:12px;font-size:11px}.bottom{grid-template-columns:repeat(4,1fr);padding:8px 8px 22px;gap:6px}.status{font-size:10px;bottom:4px}.pet{max-width:52%;max-height:80%}}
</style></head><body><div class="app"><main class="dash"><header class="top"><a class="badge" href="petbot_test.html">← Pick style</a><div><div class="siren"><span class="lamp blue"></span><span class="lamp white"></span><span class="lamp red"></span><span class="lamp white"></span><span class="lamp blue"></span></div><h1>Waaambulance PetBot</h1></div><a class="back" href="index.html">Game</a></header><section class="body"><aside class="eyePanel"><div class="eye"></div><div class="statCard"><div class="level" data-level>LV. 00</div><div class="stat"><span class="statIcon">🍔</span><div><b>Hunger</b><div class="meter"><span data-bar="hunger"></span></div></div></div><div class="stat"><span class="statIcon">😊</span><div><b>Happy</b><div class="meter"><span data-bar="happy"></span></div></div></div><div class="stat"><span class="statIcon">⚡</span><div><b>Energy</b><div class="meter"><span data-bar="energy"></span></div></div></div><div class="stat"><span class="statIcon">💊</span><div><b>Health</b><div class="meter"><span data-bar="health"></span></div></div></div></div></aside><section class="stageBox"><div class="screenTop"><div class="selector"><button class="round" data-action="prev">←</button><select data-pet-select></select><button class="round" data-action="next">→</button></div><div class="petTitle"><span data-pet-name></span> · <span data-pet-type></span></div><div class="love">💗 <span data-love>0</span></div></div><div class="windscreen" data-stage><span class="roomName">🏡 <span data-habitat-name></span></span><img class="pet" data-pet-img alt="pet"><div class="bubble" data-bubble>Ready!</div></div><div class="quickBtns"><button class="btn yellow" data-action="feed">🍔 Feed</button><button class="btn" data-action="play">🧸 Play</button><button class="btn blueBtn" data-action="rest">🌙 Rest</button><button class="btn" data-action="heal">💊 Heal</button></div></section><aside class="navCard"><button class="bigToy" data-action="habitat">🏡 Habitat</button><button class="bigToy" data-action="room">🎨 Change Room</button><button class="bigToy" data-action="shop">🛒 Shop</button><button class="bigToy" data-action="explore">🧭 Explore</button><button class="bigToy" data-action="useMain">⭐ Use Main</button><button class="bigToy" data-action="useSide">🐾 Use Side</button><div class="eye"></div></aside></section><footer class="bottom"><button class="btn yellow" data-action="feed">🍔 Feed</button><button class="btn" data-action="play">🧸 Play</button><button class="btn blueBtn" data-action="rest">🌙 Rest</button><button class="btn" data-action="heal">💊 Heal</button><button class="btn blueBtn" data-action="train">🏋️ Train</button><button class="btn yellow" data-action="explore">🧭 Explore</button><button class="btn" data-action="useMain">⭐ Main</button><button class="btn blueBtn" data-action="useSide">🐾 Side</button><div class="status" data-status>Ready.</div></footer></main></div><script>
const pets=[
  {name:'Bubbles',type:'Axolotl',level:5,love:128,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781797059/ax_idle_001.png',hunger:68,happy:80,energy:48,health:90,habitat:'Pink Bubble Room'},
  {name:'Pura',type:'Mascot',level:7,love:211,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798378/pura_idle_001.png',hunger:78,happy:72,energy:65,health:86,habitat:'Dice Den'},
  {name:'Moonbeam',type:'Unicorn',level:4,love:95,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1781798484/unicorn_idle_001.png',hunger:52,happy:60,energy:82,health:75,habitat:'Moon Meadow'},
  {name:'Hoots',type:'Owl',level:3,love:84,img:'https://res.cloudinary.com/dpwlfmhia/image/upload/v1782133620/owl_idle_001.png',hunger:58,happy:63,energy:74,health:80,habitat:'Tree Loft'}
];
let idx=0, room=0;
const rooms=[
  ['#dff8ff','#fff4fb','#ffd5ef','Pink Bubble Room'],
  ['#eaf7ff','#d6fff2','#c6f7ff','Blue Cloud Room'],
  ['#251743','#4f256d','#ffb3e6','Night Glow Room'],
  ['#fff4ce','#ffe09a','#f7c84b','Prize Room']
];
const $=id=>document.getElementById(id);
function clamp(v){return Math.max(0,Math.min(100,Number(v)||0));}
function render(){
  const p=pets[idx];
  document.querySelectorAll('[data-pet-select]').forEach(sel=>{sel.value=String(idx)});
  document.querySelectorAll('[data-pet-name]').forEach(el=>el.textContent=p.name);
  document.querySelectorAll('[data-pet-type]').forEach(el=>el.textContent=p.type);
  document.querySelectorAll('[data-love]').forEach(el=>el.textContent=p.love);
  document.querySelectorAll('[data-level]').forEach(el=>el.textContent=`LV. ${String(p.level).padStart(2,'0')}`);
  document.querySelectorAll('[data-habitat-name]').forEach(el=>el.textContent=rooms[room][3]);
  document.querySelectorAll('[data-pet-img]').forEach(img=>{img.src=p.img; img.alt=`${p.name} the ${p.type}`;});
  const bars={hunger:p.hunger,happy:p.happy,energy:p.energy,health:p.health};
  Object.entries(bars).forEach(([k,v])=>document.querySelectorAll(`[data-bar="${k}"]`).forEach(el=>el.style.width=clamp(v)+'%'));
  document.querySelectorAll('[data-stage]').forEach(stage=>{
    stage.style.setProperty('--roomA',rooms[room][0]);
    stage.style.setProperty('--roomB',rooms[room][1]);
    stage.style.setProperty('--roomC',rooms[room][2]);
  });
  setStatus(`<b>${p.name}</b> is ready in ${rooms[room][3]}. All visible buttons are real test controls.`);
}
function setStatus(html){document.querySelectorAll('[data-status]').forEach(el=>el.innerHTML=html)}
function bubble(text){
  document.querySelectorAll('[data-bubble]').forEach(b=>{b.textContent=text;b.classList.remove('show');void b.offsetWidth;b.classList.add('show')});
  document.querySelectorAll('[data-pet-img]').forEach(img=>{img.classList.remove('bounce');void img.offsetWidth;img.classList.add('bounce')});
}
function changePet(delta){idx=(idx+delta+pets.length)%pets.length;render();bubble('Pet changed 🐾')}
function act(action){
  const p=pets[idx];
  if(action==='prev')return changePet(-1);
  if(action==='next')return changePet(1);
  if(action==='room'){room=(room+1)%rooms.length; render(); return bubble('Habitat changed 🏡');}
  const msg={feed:'Fed! 🍔',play:'Play time! 🧸',rest:'Resting... 🌙',heal:'Healed! 💊',train:'Training! 🏋️',explore:'Exploring! 🧭',shop:'Shop opened 🛒',habitat:'Habitat view 🏡',useMain:'Set as main ⭐',useSide:'Set as sidekick 🐾'};
  if(action==='feed'){p.hunger=clamp(p.hunger+12);p.energy=clamp(p.energy-3)}
  if(action==='play'){p.happy=clamp(p.happy+12);p.energy=clamp(p.energy-6);p.love+=3}
  if(action==='rest'){p.energy=clamp(p.energy+16);p.hunger=clamp(p.hunger-4)}
  if(action==='heal'){p.health=clamp(p.health+12);p.love+=2}
  if(action==='train'){p.energy=clamp(p.energy-8);p.happy=clamp(p.happy+4);p.love+=1}
  if(action==='explore'){p.happy=clamp(p.happy+6);p.energy=clamp(p.energy-6);p.love+=2}
  if(action==='shop'){setStatus('<b>Shop test:</b> this will later connect to PetBot shop stock and inventory.');}
  if(action==='habitat'){setStatus('<b>Habitat test:</b> this will later read user_habitat_layout and Sheet 51.');}
  render(); bubble(msg[action]||'Done!');
}
function initPetbot(){
  document.querySelectorAll('[data-pet-select]').forEach(sel=>{
    pets.forEach((p,i)=>{const opt=document.createElement('option');opt.value=String(i);opt.textContent=`${p.name} · ${p.type}`;sel.appendChild(opt)});
    sel.addEventListener('change',e=>{idx=Number(e.target.value)||0;render();bubble('Pet selected 🐾')});
  });
  document.querySelectorAll('[data-action]').forEach(btn=>btn.addEventListener('click',()=>act(btn.dataset.action)));
  render();
}
initPetbot();
</script></body></html>
